<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MonaLisa Language Academy</title>
<style>
  :root{
    --bg:#ffffff;
    --navy:#10213f;
    --navy-soft:#1c3361;
    --surface:#f3f5f8;
    --surface-dark:#e7eaf0;
    --accent:#5b7fb8;
    --accent-soft:#dde6f4;
    --text:#1b2436;
    --text-muted:#5b6679;
    --border:#e1e5ec;
    --success:#2e7d4f;
    --success-bg:#e6f4ea;
    --error:#a3362f;
    --error-bg:#fbe9e7;
    --radius:12px;
    --shadow:0 2px 10px rgba(16,33,63,0.07);
    --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:var(--font);
    background:var(--bg);
    color:var(--text);
    line-height:1.55;
    -webkit-font-smoothing:antialiased;
  }
  a{color:var(--accent);text-decoration:none;}
  a:hover{text-decoration:underline;}
  img{max-width:100%;display:block;border-radius:var(--radius);}
  button{font-family:inherit;}
  :focus-visible{outline:3px solid var(--accent);outline-offset:2px;}

  .navbar{
    display:flex;align-items:center;justify-content:space-between;
    padding:14px 20px;border-bottom:1px solid var(--border);
    background:var(--bg);position:sticky;top:0;z-index:10;flex-wrap:wrap;gap:10px;
  }
  .nav-brand{font-weight:700;color:var(--navy);font-size:1.05rem;}
  .nav-brand span{color:var(--accent);}
  .nav-links{display:flex;gap:18px;align-items:center;flex-wrap:wrap;}
  .nav-links a{color:var(--text);font-size:0.95rem;}
  .nav-badge{
    background:var(--accent-soft);color:var(--navy);
    padding:4px 10px;border-radius:20px;font-size:0.8rem;font-weight:600;
  }

  .container{max-width:880px;margin:0 auto;padding:28px 20px 60px;}
  .narrow{max-width:680px;}

  .card{
    background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);
    padding:24px;box-shadow:var(--shadow);margin-bottom:18px;
  }
  .surface{background:var(--surface);}

  .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
  @media (max-width:600px){.grid-2{grid-template-columns:1fr;}}

  .btn{
    display:inline-block;padding:11px 20px;border-radius:8px;border:1px solid var(--navy);
    background:var(--navy);color:#fff;font-size:0.95rem;font-weight:600;cursor:pointer;
    transition:background 0.15s ease, transform 0.1s ease;
  }
  .btn:hover{background:var(--navy-soft);}
  .btn:active{transform:translateY(1px);}
  .btn-secondary{background:#fff;color:var(--navy);border:1px solid var(--border);}
  .btn-secondary:hover{background:var(--surface);}
  .btn-block{display:block;width:100%;text-align:center;}
  .btn[disabled]{opacity:0.5;cursor:not-allowed;}

  .hero{padding:8px 0 30px;}
  .hero h1{font-size:1.9rem;color:var(--navy);margin:0 0 10px;}
  .hero p{color:var(--text-muted);font-size:1.05rem;max-width:520px;}
  .hero-image{margin:20px 0;overflow:hidden;border-radius:var(--radius);}
  .hero-image img{width:100%;height:240px;object-fit:cover;}
  .hero-actions{display:flex;gap:12px;flex-wrap:wrap;margin-top:18px;}

  h2{color:var(--navy);font-size:1.3rem;margin-top:0;}
  h3{color:var(--navy);font-size:1.05rem;}
  .eyebrow{
    font-size:0.78rem;letter-spacing:0.04em;text-transform:uppercase;
    color:var(--accent);font-weight:700;margin-bottom:6px;
  }
  .muted{color:var(--text-muted);}

  .level-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:14px;}
  .level-btn{
    border:1px solid var(--border);background:var(--surface);border-radius:var(--radius);
    padding:18px 14px;text-align:left;cursor:pointer;transition:border-color 0.15s ease;
  }
  .level-btn:hover{border-color:var(--accent);}
  .level-btn .code{font-weight:700;color:var(--navy);font-size:1.1rem;}
  .level-btn .label{color:var(--text-muted);font-size:0.88rem;}
  .level-btn .check{color:var(--success);font-size:0.85rem;margin-top:6px;}

  .lesson-card{
    border:1px solid var(--border);border-radius:var(--radius);padding:18px;
    display:flex;justify-content:space-between;align-items:center;gap:14px;background:#fff;
  }
  .lesson-card .title{font-weight:600;color:var(--navy);}
  .lesson-card .meta{color:var(--text-muted);font-size:0.85rem;}

  .progress-track{background:var(--surface-dark);border-radius:20px;height:10px;overflow:hidden;}
  .progress-fill{background:var(--accent);height:100%;border-radius:20px;transition:width 0.3s ease;}
  .progress-row{display:flex;align-items:center;gap:10px;margin:10px 0;}
  .progress-row .progress-track{flex:1;}
  .progress-row .pct{font-size:0.85rem;color:var(--text-muted);min-width:48px;text-align:right;}

  table.vocab{width:100%;border-collapse:collapse;margin-top:10px;}
  table.vocab th, table.vocab td{
    text-align:left;padding:10px 12px;border-bottom:1px solid var(--border);font-size:0.92rem;
  }
  table.vocab th{color:var(--navy);background:var(--surface);font-size:0.82rem;text-transform:uppercase;letter-spacing:0.03em;}

  .translation-item{
    border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px;
  }
  .translation-item .source{font-weight:600;margin-bottom:8px;}
  .translation-item input[type="text"]{
    width:100%;padding:9px 10px;border:1px solid var(--border);border-radius:6px;font-size:0.95rem;
    margin-top:6px;
  }
  .translation-item .reveal{margin-top:8px;font-size:0.9rem;color:var(--text-muted);}
  .translation-item .reveal.shown{color:var(--success);font-weight:600;}

  .q-block{border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:14px;}
  .q-block .q-text{font-weight:600;margin-bottom:10px;}
  .q-block .opt{display:block;padding:8px 10px;border-radius:6px;margin-bottom:6px;cursor:pointer;border:1px solid var(--border);}
  .q-block .opt:hover{background:var(--surface);}
  .q-block input[type="radio"]{margin-right:8px;}
  .q-block input[type="text"]{padding:9px 10px;border:1px solid var(--border);border-radius:6px;width:100%;}
  .q-feedback{margin-top:8px;font-size:0.88rem;font-weight:600;padding:6px 10px;border-radius:6px;display:none;}
  .q-feedback.correct{display:block;background:var(--success-bg);color:var(--success);}
  .q-feedback.incorrect{display:block;background:var(--error-bg);color:var(--error);}
  .match-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;flex-wrap:wrap;}
  .match-row span{min-width:140px;font-weight:600;}
  .match-row select{padding:7px 8px;border:1px solid var(--border);border-radius:6px;}

  .result-score{font-size:2.4rem;color:var(--navy);font-weight:700;margin:6px 0;}
  .result-banner{
    border-radius:var(--radius);padding:18px;margin-bottom:16px;
  }
  .result-banner.pass{background:var(--success-bg);color:var(--success);}
  .result-banner.fail{background:var(--error-bg);color:var(--error);}

  .culture-section{margin-bottom:26px;}
  .culture-section ul{padding-left:20px;}
  .culture-image{margin:14px 0;overflow:hidden;border-radius:var(--radius);}
  .culture-image img{width:100%;height:200px;object-fit:cover;}
  .culture-caption{font-size:0.82rem;color:var(--text-muted);margin-top:6px;}

  footer{
    border-top:1px solid var(--border);padding:22px 20px;text-align:center;
    color:var(--text-muted);font-size:0.78rem;margin-top:30px;
  }
</style>
</head>
<body>
<div id="app"></div>
<script>
/* ---------- Data ---------- */

var LANGUAGES = ["German", "English"];

var LEVELS = {
  "German": [
    {code:"A0", label:"Absolute Beginner"},
    {code:"A1", label:"Beginner"},
    {code:"A2", label:"Elementary"},
    {code:"B1", label:"Intermediate"},
    {code:"B2", label:"Upper Intermediate"},
    {code:"C1", label:"Advanced"},
    {code:"C2", label:"Mastery"}
  ],
  "English": [
    {code:"Beginner", label:"Just starting out"},
    {code:"Elementary", label:"Basic conversations"},
    {code:"Intermediate", label:"Comfortable speaking"},
    {code:"Upper-Intermediate", label:"Confident speaking"},
    {code:"Advanced", label:"Precise and detailed"},
    {code:"Fluent", label:"Natural and idiomatic"}

var LESSONS = [
{
  id:"de-A0-01", language:"German", level:"A0",
  title:"Greetings and Introductions",
  intro:"This lesson introduces the words German speakers use every day to greet each other and share their name. You will hear these words in almost every conversation, so they are worth learning first.",
  concept:"German greetings change depending on the time of day and how formal the situation is. Friends use casual words like Hallo and Tschüss, while strangers and formal settings call for Guten Tag. Learning this difference now will help you sound natural from the start.",
  vocabulary:[
    {en:"hello", de:"Hallo", example:"Hallo, ich heiße Lena."},
    {en:"good morning", de:"Guten Morgen", example:"Guten Morgen, Herr Schmidt."},
    {en:"goodbye", de:"Auf Wiedersehen", example:"Auf Wiedersehen und bis morgen."},
    {en:"bye (informal)", de:"Tschüss", example:"Tschüss, bis später."},
    {en:"my name is", de:"Ich heiße", example:"Ich heiße Markus."},
    {en:"please", de:"Bitte", example:"Ein Kaffee, bitte."},
    {en:"thank you", de:"Danke", example:"Danke für die Hilfe."}
  ],
  translations:[
    {en:"Hello, my name is Anna.", de:"Hallo, ich heiße Anna."},
    {en:"Good morning, how are you?", de:"Guten Morgen, wie geht es dir?"},
    {en:"Thank you very much.", de:"Vielen Dank."},
    {en:"What is your name?", de:"Wie heißt du?"},
    {en:"Goodbye and see you soon.", de:"Auf Wiedersehen und bis bald."}
  ],
  practice:[
    {type:"mcq", q:"How do you say hello in German?", options:["Hallo","Tschüss","Danke","Bitte"], answer:"Hallo"},
    {type:"mcq", q:"Which phrase means my name is?", options:["Ich heiße","Wie geht es","Auf Wiedersehen","Guten Tag"], answer:"Ich heiße"},
    {type:"fill", q:"Guten ___, Frau Klein.", answer:"Morgen"},
    {type:"fill", q:"Vielen ___ für die Hilfe.", answer:"Dank"},
    {type:"match", pairs:[["Hallo","hello"],["Tschüss","bye (informal)"],["Danke","thank you"]]}
  ],
  quiz:[
    {q:"What does Guten Morgen mean?", options:["Good morning","Good night","Good afternoon","Goodbye"], answer:"Good morning"},
    {q:"Choose the correct informal goodbye.", options:["Tschüss","Bitte","Ich heiße","Danke"], answer:"Tschüss"},
    {q:"Complete: Ich ___ Lena.", options:["heiße","bin","habe","mache"], answer:"heiße"},
    {q:"What is the German word for please?", options:["Bitte","Danke","Hallo","Tschüss"], answer:"Bitte"}
  ]
},
{
  id:"de-A1-01", language:"German", level:"A1",
  title:"Talking About Daily Routines",
  intro:"Once you can greet someone, the next step is talking about your day. This lesson covers the present tense verbs that describe everyday actions.",
  concept:"German present tense verbs change their ending to match the subject of the sentence. Time expressions like jeden Tag usually come early in the sentence, right after the verb.",
  vocabulary:[
    {en:"to get up", de:"aufstehen", example:"Ich stehe um sieben Uhr auf."},
    {en:"to work", de:"arbeiten", example:"Er arbeitet jeden Tag."},
    {en:"to eat", de:"essen", example:"Wir essen um zwölf Uhr."},
    {en:"to sleep", de:"schlafen", example:"Sie schläft früh."},
    {en:"every day", de:"jeden Tag", example:"Ich lerne jeden Tag Deutsch."},
    {en:"early", de:"früh", example:"Ich stehe früh auf."},
    {en:"late", de:"spät", example:"Er kommt spät nach Hause."}
  ],
  translations:[
    {en:"I get up at seven o'clock.", de:"Ich stehe um sieben Uhr auf."},
    {en:"She works every day.", de:"Sie arbeitet jeden Tag."},
    {en:"We eat lunch at noon.", de:"Wir essen mittags."},
    {en:"He sleeps early.", de:"Er schläft früh."},
    {en:"I learn German every day.", de:"Ich lerne jeden Tag Deutsch."}
  ],
  practice:[
    {type:"mcq", q:"Choose the correct verb form: Ich ___ um sieben Uhr auf.", options:["stehe","steht","stehen","stehst"], answer:"stehe"},
    {type:"mcq", q:"Which word means every day?", options:["jeden Tag","spät","früh","heute"], answer:"jeden Tag"},
    {type:"fill", q:"Er ___ jeden Tag. (arbeiten)", answer:"arbeitet"},
    {type:"fill", q:"Wir ___ um zwölf Uhr. (essen)", answer:"essen"},
    {type:"match", pairs:[["aufstehen","to get up"],["schlafen","to sleep"],["arbeiten","to work"]]}
  ],
  quiz:[
    {q:"What is the correct form of arbeiten for er?", options:["arbeitet","arbeite","arbeiten","arbeitest"], answer:"arbeitet"},
    {q:"Which word means early?", options:["früh","spät","jeden Tag","heute"], answer:"früh"},
    {q:"Complete: Sie ___ früh.", options:["schläft","schlafe","schlafen","schläfst"], answer:"schläft"},
    {q:"What does jeden Tag mean?", options:["every day","every week","sometimes","never"], answer:"every day"}
  ]
},
{
  id:"de-A2-01", language:"German", level:"A2",
  title:"Making Plans for the Weekend",
  intro:"This lesson shows how to suggest activities and respond to plans using two of the most common modal verbs in German.",
  concept:"Möchten and können both pair with an infinitive verb that moves to the end of the sentence. Möchten expresses a wish, while können expresses ability or possibility.",
  vocabulary:[
    {en:"would like to", de:"möchten", example:"Ich möchte ins Kino gehen."},
    {en:"can", de:"können", example:"Wir können morgen schwimmen."},
    {en:"weekend", de:"das Wochenende", example:"Was machst du am Wochenende?"},
    {en:"maybe", de:"vielleicht", example:"Vielleicht gehen wir wandern."},
    {en:"plan", de:"der Plan", example:"Hast du einen Plan?"},
    {en:"together", de:"zusammen", example:"Wir treffen uns zusammen."},
    {en:"cinema", de:"das Kino", example:"Gehen wir ins Kino?"}
  ],
  translations:[
    {en:"I would like to go to the cinema.", de:"Ich möchte ins Kino gehen."},
    {en:"Can we meet on Saturday?", de:"Können wir am Samstag treffen?"},
    {en:"Maybe we will go hiking.", de:"Vielleicht gehen wir wandern."},
    {en:"What are your plans for the weekend?", de:"Was sind deine Pläne für das Wochenende?"},
    {en:"We can swim together.", de:"Wir können zusammen schwimmen."}
  ],
  practice:[
    {type:"mcq", q:"Choose the correct modal: Ich ___ ins Kino gehen.", options:["möchte","möchten","möchtest","möchtet"], answer:"möchte"},
    {type:"mcq", q:"Which word means weekend?", options:["das Wochenende","der Plan","das Kino","vielleicht"], answer:"das Wochenende"},
    {type:"fill", q:"Wir ___ morgen schwimmen. (können)", answer:"können"},
    {type:"fill", q:"___ gehen wir wandern. (vielleicht)", answer:"Vielleicht"},
    {type:"match", pairs:[["möchten","would like to"],["können","can"],["zusammen","together"]]}
  ],
  quiz:[
    {q:"What does möchten mean?", options:["would like to","can","have to","should"], answer:"would like to"},
    {q:"Complete: Wir ___ morgen schwimmen.", options:["können","kann","könnt","könnte"], answer:"können"},
    {q:"Which word means maybe?", options:["vielleicht","zusammen","der Plan","das Kino"], answer:"vielleicht"},
    {q:"Choose the correct translation of together.", options:["zusammen","vielleicht","das Wochenende","der Plan"], answer:"zusammen"}
  ]
},
{
  id:"de-B1-01", language:"German", level:"B1",
  title:"Describing Past Experiences",
  intro:"To talk about what happened yesterday or last year, German speakers rely heavily on the Perfekt tense. This lesson introduces the pattern.",
  concept:"The Perfekt tense is built with haben or sein plus a past participle, which moves to the end of the sentence. Verbs of movement and change of state, like fahren and sein, usually pair with sein.",
  vocabulary:[
    {en:"done (participle of machen)", de:"gemacht", example:"Ich habe meine Hausaufgaben gemacht."},
    {en:"been (participle of sein)", de:"gewesen", example:"Ich bin in Berlin gewesen."},
    {en:"traveled (participle of fahren)", de:"gefahren", example:"Wir sind nach München gefahren."},
    {en:"seen (participle of sehen)", de:"gesehen", example:"Hast du den Film gesehen?"},
    {en:"last year", de:"letztes Jahr", example:"Letztes Jahr war ich in Italien."},
    {en:"experience", de:"die Erfahrung", example:"Das war eine gute Erfahrung."},
    {en:"to tell", de:"erzählen", example:"Erzähl mir von deiner Reise."}
  ],
  translations:[
    {en:"I have done my homework.", de:"Ich habe meine Hausaufgaben gemacht."},
    {en:"We traveled to Munich last year.", de:"Wir sind letztes Jahr nach München gefahren."},
    {en:"Have you seen this film?", de:"Hast du diesen Film gesehen?"},
    {en:"That was a good experience.", de:"Das war eine gute Erfahrung."},
    {en:"Tell me about your trip.", de:"Erzähl mir von deiner Reise."}
  ],
  practice:[
    {type:"mcq", q:"Choose the correct participle of sehen.", options:["gesehen","gesehn","sehen","gesieht"], answer:"gesehen"},
    {type:"mcq", q:"Which helping verb usually goes with fahren?", options:["sein","haben","werden","können"], answer:"sein"},
    {type:"fill", q:"Ich habe meine Hausaufgaben ___. (machen)", answer:"gemacht"},
    {type:"fill", q:"Wir sind letztes Jahr nach Rom ___. (fahren)", answer:"gefahren"},
    {type:"match", pairs:[["gemacht","done"],["gewesen","been"],["gefahren","traveled"]]}
  ],
  quiz:[
    {q:"Which helping verb is used with gewesen?", options:["sein","haben","werden","müssen"], answer:"sein"},
    {q:"What does letztes Jahr mean?", options:["last year","next year","this week","every year"], answer:"last year"},
    {q:"Complete: Hast du den Film ___?", options:["gesehen","sehen","siehst","sah"], answer:"gesehen"},
    {q:"Choose the correct translation of die Erfahrung.", options:["experience","plan","trip","homework"], answer:"experience"}
  ]
},
{
  id:"de-B2-01", language:"German", level:"B2",
  title:"Expressing Opinions and Arguments",
  intro:"At this level, you can move past simple statements and start building real arguments. This lesson focuses on the connectors that introduce reasons and beliefs.",
  concept:"Weil and dass both send the conjugated verb to the end of their clause. Weil introduces a reason, while dass introduces a statement of fact or belief after verbs like glauben or finden.",
  vocabulary:[
    {en:"in my opinion", de:"meiner Meinung nach", example:"Meiner Meinung nach ist das wichtig."},
    {en:"because", de:"weil", example:"Ich bleibe zu Hause, weil es regnet."},
    {en:"that", de:"dass", example:"Ich glaube, dass er recht hat."},
    {en:"advantage", de:"der Vorteil", example:"Das hat einen großen Vorteil."},
    {en:"disadvantage", de:"der Nachteil", example:"Es gibt auch einen Nachteil."},
    {en:"to argue", de:"argumentieren", example:"Sie argumentiert sehr klar."},
    {en:"on one hand", de:"einerseits", example:"Einerseits ist es teuer, andererseits ist es nützlich."}
  ],
  translations:[
    {en:"In my opinion, this is important.", de:"Meiner Meinung nach ist das wichtig."},
    {en:"I am staying home because it is raining.", de:"Ich bleibe zu Hause, weil es regnet."},
    {en:"I believe that he is right.", de:"Ich glaube, dass er recht hat."},
    {en:"This has a clear advantage.", de:"Das hat einen klaren Vorteil."},
    {en:"On one hand it is expensive, on the other hand it is useful.", de:"Einerseits ist es teuer, andererseits ist es nützlich."}
  ],
  practice:[
    {type:"mcq", q:"Where does the verb go in a weil clause?", options:["at the end","at the start","right after weil","it does not move"], answer:"at the end"},
    {type:"mcq", q:"Which word introduces a reason?", options:["weil","dass","und","aber"], answer:"weil"},
    {type:"fill", q:"Ich glaube, ___ er recht hat. (dass)", answer:"dass"},
    {type:"fill", q:"Das hat einen großen ___. (Vorteil)", answer:"Vorteil"},
    {type:"match", pairs:[["der Vorteil","advantage"],["der Nachteil","disadvantage"],["argumentieren","to argue"]]}
  ],
  quiz:[
    {q:"What does meiner Meinung nach mean?", options:["in my opinion","in general","for example","on the other hand"], answer:"in my opinion"},
    {q:"Complete: Ich bleibe zu Hause, ___ es regnet.", options:["weil","dass","und","aber"], answer:"weil"},
    {q:"Which word means disadvantage?", options:["der Nachteil","der Vorteil","die Erfahrung","die Meinung"], answer:"der Nachteil"},
    {q:"In a dass clause, where does the conjugated verb go?", options:["at the end","right after dass","at the start","it stays the same"], answer:"at the end"}
  ]
},
{
  id:"de-C1-01", language:"German", level:"C1",
  title:"Nuanced Communication in Professional Settings",
  intro:"Professional German often relies on softened, indirect language. This lesson covers the Konjunktiv II forms used for polite requests and careful suggestions.",
  concept:"Konjunktiv II forms such as könnten, würde, and hätte make a request or statement sound less direct. They are standard in emails, meetings, and any setting where bluntness would feel out of place.",
  vocabulary:[
    {en:"could (polite)", de:"könnten", example:"Könnten Sie mir bitte helfen?"},
    {en:"would", de:"würde", example:"Ich würde das anders machen."},
    {en:"would have", de:"hätte", example:"Das hätte ich nicht erwartet."},
    {en:"polite", de:"höflich", example:"Bitte formulieren Sie das höflich."},
    {en:"request", de:"die Anfrage", example:"Ich habe eine Anfrage an Sie."},
    {en:"regarding", de:"bezüglich", example:"Bezüglich Ihrer E-Mail habe ich eine Frage."},
    {en:"urgent", de:"dringend", example:"Das Thema ist dringend."}
  ],
  translations:[
    {en:"Could you please help me?", de:"Könnten Sie mir bitte helfen?"},
    {en:"I would do that differently.", de:"Ich würde das anders machen."},
    {en:"I have a request for you.", de:"Ich habe eine Anfrage an Sie."},
    {en:"Regarding your email, I have a question.", de:"Bezüglich Ihrer E-Mail habe ich eine Frage."},
    {en:"This matter is urgent.", de:"Dieses Thema ist dringend."}
  ],
  practice:[
    {type:"mcq", q:"Which form is the polite Konjunktiv II of können?", options:["könnten","können","konnte","kann"], answer:"könnten"},
    {type:"mcq", q:"Which word means regarding?", options:["bezüglich","dringend","höflich","die Anfrage"], answer:"bezüglich"},
    {type:"fill", q:"Ich ___ das anders machen. (würde)", answer:"würde"},
    {type:"fill", q:"Das Thema ist ___. (dringend)", answer:"dringend"},
    {type:"match", pairs:[["höflich","polite"],["die Anfrage","request"],["dringend","urgent"]]}
  ],
  quiz:[

var IMAGES = {
  berlin:"https://commons.wikimedia.org/wiki/Special:FilePath/Berlin_skyline_2-7-2003.JPG?width=900",
  matterhorn:"https://commons.wikimedia.org/wiki/Special:FilePath/View_of_The_Matterhorn_from_Gornergrat_Railway.jpg?width=900",
  luxembourg:"https://commons.wikimedia.org/wiki/Special:FilePath/Bock_Luxembourg1.JPG?width=900"
};

/* ---------- State ---------- */

var STORAGE_KEY = "monalisa_state_v1";

function defaultState(){
  return {language:null, level:null, completed:{}, lastRoute:"#/", lastVisited:null};
}

var state = loadState();

function loadState(){
  try{
    var raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return defaultState();
    var parsed = JSON.parse(raw);
    return Object.assign(defaultState(), parsed);
  }catch(e){
    return defaultState();
  }
}

function saveState(){
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }catch(e){}
}

function getLesson(id){
  for(var i=0;i<LESSONS.length;i++){
    if(LESSONS[i].id === id) return LESSONS[i];
  }
  return null;
}

function lessonsFor(language, level){
  return LESSONS.filter(function(l){ return l.language===language && l.level===level; });
}

function levelLessonCount(language, level){
  return lessonsFor(language, level).length;
}

function levelCompletedCount(language, level){
  var lessons = lessonsFor(language, level);
  var n = 0;
  lessons.forEach(function(l){
    var c = state.completed[l.id];
    if(c && c.passed) n++;
  });
  return n;
}

/* ---------- Helpers ---------- */

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, function(c){
    return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c];
  });
}

function normalize(s){
  return String(s).trim().toLowerCase();
}

/* ---------- Layout pieces ---------- */

function navbar(){
  var badge = "";
  if(state.language && state.level){
    badge = '<span class="nav-badge">'+escapeHtml(state.language)+' &middot; '+escapeHtml(state.level)+'</span>';
  }
  var dashboardLink = (state.language && state.level) ? '<a href="#/dashboard">Dashboard</a>' : "";
  return ''+
  '<nav class="navbar">'+
    '<a href="#/" class="nav-brand">MonaLisa <span>Language Academy</span></a>'+
    '<div class="nav-links">'+
      dashboardLink+
      '<a href="#/languages">Languages</a>'+
      '<a href="#/culture">Culture</a>'+
      badge+
    '</div>'+
  '</nav>';
}

function footerHtml(){
  return ''+
  '<footer>'+
    'MonaLisa Language Academy, built by MonaLisa Tech Solutions.<br>'+
    'kabuusumonalisa@gmail.com &nbsp;&middot;&nbsp; +256703703711'+
  '</footer>';
}

function progressBar(pct){
  pct = Math.max(0, Math.min(100, pct));
  return ''+
  '<div class="progress-row">'+
    '<div class="progress-track"><div class="progress-fill" style="width:'+pct+'%"></div></div>'+
    '<div class="pct">'+pct+'%</div>'+
  '</div>';
}

/* ---------- Renderers ---------- */

var app = document.getElementById("app");

function render(){
  var hash = location.hash || "#/";
  state.lastRoute = hash;
  saveState();
  var parts = hash.replace(/^#\//,"").split("/");
  var view = parts[0];
  var param = parts[1] ? decodeURIComponent(parts[1]) : null;

  if(view==="" || view==="/" ){ renderLanding(); }
  else if(view==="languages"){ renderLanguageSelect(); }
  else if(view==="levels"){ renderLevelSelect(); }
  else if(view==="dashboard"){ renderDashboard(); }
  else if(view==="lesson"){ renderLessonView(param); }
  else if(view==="practice"){ renderPractice(param); }
  else if(view==="quiz"){ renderQuiz(param); }
  else if(view==="result"){ renderResult(param); }
  else if(view==="culture"){ renderCulture(); }
  else { renderLanding(); }

  window.scrollTo(0,0);
}

function renderLanding(){
  var resumeBtn = "";
  if(state.language && state.level){
    resumeBtn = '<a href="#/dashboard" class="btn">Continue learning</a>';
  }
  app.innerHTML = navbar() +
  '<div class="container">'+
    '<div class="hero">'+
      '<div class="eyebrow">Bilingual learning, built for steady progress</div>'+
      '<h1>Learn German or English at your own pace</h1>'+
      '<p>Structured lessons, real vocabulary, and short quizzes take you from your first words to fluent, natural conversation. Pick a language to begin.</p>'+
      '<div class="hero-image"><img src="'+IMAGES.berlin+'" alt="Skyline view of Berlin, Germany" loading="lazy"></div>'+
      '<div class="hero-actions">'+
        '<button class="btn" data-action="start-language" data-language="German">Start learning German</button>'+
        '<button class="btn btn-secondary" data-action="start-language" data-language="English">Start learning English</button>'+
        resumeBtn+
      '</div>'+
    '</div>'+
    '<div class="card surface">'+
      '<h2>How the academy works</h2>'+
      '<p class="muted">Every lesson follows the same structure: a short introduction, one core concept, a vocabulary table, guided translation, five practice questions, and a short quiz. Your progress saves automatically, so you can stop at any point and pick up later.</p>'+
    '</div>'+
  '</div>'+ footerHtml();
}

function renderLanguageSelect(){
  var cards = LANGUAGES.map(function(lang){
    return '<button class="level-btn" data-action="choose-language" data-language="'+lang+'" style="text-align:center">'+
      '<div class="code">'+lang+'</div>'+
      '<div class="label">'+(lang==="German" ? "A0 to C2" : "Beginner to Fluent")+'</div>'+
    '</button>';
  }).join("");
  app.innerHTML = navbar() +
  '<div class="container narrow">'+
    '<h2>Choose a language</h2>'+
    '<p class="muted">You can switch languages at any time. Your progress in each one is saved separately.</p>'+
    '<div class="level-grid">'+cards+'</div>'+
  '</div>'+ footerHtml();
}

function renderLevelSelect(){
  if(!state.language){ location.hash = "#/languages"; return; }
  var levels = LEVELS[state.language];
  var cards = levels.map(function(lv){
    var total = levelLessonCount(state.language, lv.code);
    var done = levelCompletedCount(state.language, lv.code);
    var check = (total>0 && done===total) ? '<div class="check">Completed</div>' : "";
    return '<button class="level-btn" data-action="choose-level" data-level="'+lv.code+'">'+
      '<div class="code">'+lv.code+'</div>'+
      '<div class="label">'+lv.label+'</div>'+
      check+
    '</button>';
  }).join("");
  app.innerHTML = navbar() +
  '<div class="container narrow">'+
    '<div class="eyebrow">'+state.language+'</div>'+
    '<h2>Choose your level</h2>'+
    '<p class="muted">Not sure where to start? Pick the level that matches what you can already say and understand.</p>'+
    '<div class="level-grid">'+cards+'</div>'+
  '</div>'+ footerHtml();
}

function renderDashboard(){
  if(!state.language){ location.hash = "#/languages"; return; }
  if(!state.level){ location.hash = "#/levels"; return; }

  var lessons = lessonsFor(state.language, state.level);
  var total = lessons.length;
  var done = levelCompletedCount(state.language, state.level);
  var pct = total>0 ? Math.round((done/total)*100) : 0;

  var continueHtml = "";
  var target = state.lastVisited;
  if(target && target.language===state.language && target.level===state.level && getLesson(target.lessonId)){
    var lesson = getLesson(target.lessonId);
    var routeMap = {lesson:"lesson", practice:"practice", quiz:"quiz"};
    var stage = target.stage || "lesson";
    continueHtml = ''+
    '<div class="card">'+
      '<div class="eyebrow">Continue learning</div>'+
      '<div class="lesson-card">'+
        '<div><div class="title">'+escapeHtml(lesson.title)+'</div><div class="meta">'+lesson.language+' &middot; '+lesson.level+'</div></div>'+
        '<a class="btn" href="#/'+stage+'/'+lesson.id+'">Resume</a>'+
      '</div>'+
    '</div>';
  }

  var lessonCards = lessons.map(function(l){
    var c = state.completed[l.id];
    var status = c && c.passed ? '<div class="meta" style="color:#2e7d4f">Completed, score '+c.quizScore+'/'+c.quizTotal+'</div>' : '<div class="meta">Not started</div>';
    return '<div class="lesson-card">'+
      '<div><div class="title">'+escapeHtml(l.title)+'</div>'+status+'</div>'+
      '<a class="btn btn-secondary" href="#/lesson/'+l.id+'">Open</a>'+
    '</div>';
  }).join('<div style="height:10px"></div>');

  app.innerHTML = navbar() +
  '<div class="container">'+
    '<div class="eyebrow">'+state.language+' &middot; '+state.level+'</div>'+
    '<h2>Your dashboard</h2>'+
    progressBar(pct)+
    continueHtml+
    '<div class="card">'+
      '<h3>Lessons in this level</h3>'+
      lessonCards+
    '</div>'+
    '<div class="card surface">'+
      '<a href="#/levels">Switch level</a> &nbsp;&middot;&nbsp; <a href="#/languages">Switch language</a>'+
    '</div>'+
  '</div>'+ footerHtml();
}

  state.language = lesson.language;
  state.level = lesson.level;

  '<div class="container narrow">'+
    '<div class="eyebrow">'+lesson.language+' &middot; '+lesson.level+' &middot; '+lesson.id+'</div>'+
    '<h2>'+escapeHtml(lesson.title)+'</h2>'+

    '<div class="card">'+
      '<h3>Introduction</h3>'+
      '<p>'+escapeHtml(lesson.intro)+'</p>'+
    '</div>'+

    '<div class="card">'+
      '<h3>Core concept</h3>'+
      '<p>'+escapeHtml(lesson.concept)+'</p>'+
    '</div>'+

    '<div class="card">'+
      '<h3>Vocabulary</h3>'+

      '<tbody>'+vocabRows+'</tbody></table>'+

    '<div class="card">'+
      '<h3>Translation practice</h3>'+
      '<p class="muted">Type your best attempt, then check the answer.</p>'+

    '</div>'+

    '<a class="btn btn-block" href="#/practice/'+lesson.id+'">Continue to practice</a>'+

function renderPractice(id){
  var lesson = getLesson(id);
  if(!lesson){ location.hash = "#/dashboard"; return; }
  state.lastVisited = {language:lesson.language, level:lesson.level, lessonId:lesson.id, stage:"practice"};
  saveState();

  var blocks = lesson.practice.map(function(p, i){
    if(p.type==="mcq"){
      var opts = p.options.map(function(o){
        return '<label class="opt"><input type="radio" name="practice-'+i+'" value="'+escapeHtml(o)+'"> '+escapeHtml(o)+'</label>';
      }).join("");
      return '<div class="q-block" data-practice-index="'+i+'" data-type="mcq" data-answer="'+escapeHtml(p.answer)+'">'+
        '<div class="q-text">'+(i+1)+'. '+escapeHtml(p.q)+'</div>'+opts+
        '<div class="q-feedback"></div>'+
      '</div>';
    }
    if(p.type==="fill"){
      return '<div class="q-block" data-practice-index="'+i+'" data-type="fill" data-answer="'+escapeHtml(p.answer)+'">'+
        '<div class="q-text">'+(i+1)+'. '+escapeHtml(p.q)+'</div>'+
        '<input type="text" placeholder="Type your answer">'+
        '<div class="q-feedback"></div>'+
      '</div>';
    }
    if(p.type==="match"){
      var leftItems = p.pairs.map(function(pair){ return pair[0]; });
      var rightItems = p.pairs.map(function(pair){ return pair[1]; }).sort(function(){ return Math.random()-0.5; });
      var rows = leftItems.map(function(left, idx){
        var options = rightItems.map(function(r){ return '<option value="'+escapeHtml(r)+'">'+escapeHtml(r)+'</option>'; }).join("");
        return '<div class="match-row"><span>'+escapeHtml(left)+'</span><select data-match-select="'+idx+'"><option value="">Choose meaning</option>'+options+'</select></div>';
      }).join("");
      var answersJson = escapeHtml(JSON.stringify(p.pairs));
      return '<div class="q-block" data-practice-index="'+i+'" data-type="match" data-pairs="'+answersJson+'">'+
        '<div class="q-text">'+(i+1)+'. Match each word to its meaning</div>'+rows+
        '<div class="q-feedback"></div>'+
      '</div>';
    }
  }).join("");

  app.innerHTML = navbar() +
  '<div class="container narrow">'+
    '<div class="eyebrow">'+lesson.language+' &middot; '+lesson.level+'</div>'+
    '<h2>Practice: '+escapeHtml(lesson.title)+'</h2>'+
    '<p class="muted">Five questions, no pressure. Check your answers as many times as you like.</p>'+
    blocks+
    '<div style="display:flex;gap:12px;flex-wrap:wrap">'+
      '<button class="btn btn-secondary" data-action="check-practice">Check answers</button>'+
      '<a class="btn" href="#/quiz/'+lesson.id+'">Continue to quiz</a>'+
    '</div>'+
  '</div>'+ footerHtml();
}

function renderQuiz(id){
  var lesson = getLesson(id);
  if(!lesson){ location.hash = "#/dashboard"; return; }
  state.lastVisited = {language:lesson.language, level:lesson.level, lessonId:lesson.id, stage:"quiz"};

  var blocks = lesson.quiz.map(function(q, i){
    var opts = q.options.map(function(o){
      return '<label class="opt"><input type="radio" name="quiz-'+i+'" value="'+escapeHtml(o)+'"> '+escapeHtml(o)+'</label>';

    return '<div class="q-block" data-quiz-index="'+i+'" data-answer="'+escapeHtml(q.answer)+'">'+
      '<div class="q-text">'+(i+1)+'. '+escapeHtml(q.q)+'</div>'+opts+
    '</div>';
  }).join("");

  app.innerHTML = navbar() +
  '<div class="container narrow">'+
    '<div class="eyebrow">'+lesson.language+' &middot; '+lesson.level+'</div>'+
    '<h2>Quiz: '+escapeHtml(lesson.title)+'</h2>'+

  var lesson = getLesson(id);

  var bannerClass = c.passed ? "pass" : "fail";
  var bannerText = c.passed ? "Lesson passed" : "Not quite there yet";

/* ---------- Event handling ---------- */

app.addEventListener("click", function(e){
  var actionEl = e.target.closest("[data-action]");
  if(!actionEl) return;
  var action = actionEl.getAttribute("data-action");

  if(action==="start-language" || action==="choose-language"){
    state.language = actionEl.getAttribute("data-language");
    saveState();
    location.hash = "#/levels";
  }
  else if(action==="choose-level"){
    state.level = actionEl.getAttribute("data-level");
    saveState();
    location.hash = "#/dashboard";
  }
  else if(action==="reveal-translation"){
    e.preventDefault();
    var idx = actionEl.getAttribute("data-index");
    var node = app.querySelector('[data-translation-reveal="'+idx+'"]');
    if(node){
      node.textContent = node.getAttribute("data-answer");
      node.classList.add("shown");
    }
  }
  else if(action==="check-practice"){
    checkPractice();
  }
  else if(action==="submit-quiz"){
    submitQuiz(actionEl.getAttribute("data-lesson"));
  }
});

function checkPractice(){
  var blocks = app.querySelectorAll(".q-block");
  blocks.forEach(function(block){
    var type = block.getAttribute("data-type");
    var feedback = block.querySelector(".q-feedback");
    if(type==="mcq"){
      var selected = block.querySelector('input[type="radio"]:checked');
      var answer = block.getAttribute("data-answer");
      if(!selected){
        feedback.className = "q-feedback incorrect";
        feedback.textContent = "Choose an answer first.";
        return;
      }
      if(normalize(selected.value)===normalize(answer)){
        feedback.className = "q-feedback correct";
        feedback.textContent = "Correct.";
      } else {
        feedback.className = "q-feedback incorrect";
        feedback.textContent = "Not quite. The correct answer is " + answer + ".";
      }
    }
    else if(type==="fill"){
      var input = block.querySelector('input[type="text"]');
      var ans = block.getAttribute("data-answer");
      if(normalize(input.value)===normalize(ans)){
        feedback.className = "q-feedback correct";
        feedback.textContent = "Correct.";
      } else {
        feedback.className = "q-feedback incorrect";
        feedback.textContent = "Not quite. The correct answer is " + ans + ".";
      }
    }
    else if(type==="match"){
      var pairs = JSON.parse(block.getAttribute("data-pairs").replace(/&quot;/g,'"').replace(/&#39;/g,"'").replace(/&amp;/g,"&"));
      var selects = block.querySelectorAll("select");
      var allCorrect = true;
      selects.forEach(function(sel, idx){
        var expected = pairs[idx][1];
        if(normalize(sel.value)!==normalize(expected)) allCorrect = false;
      });
      if(allCorrect){
        feedback.className = "q-feedback correct";
        feedback.textContent = "All matches correct.";
      } else {
        feedback.className = "q-feedback incorrect";
        feedback.textContent = "Some matches are not right yet. Try again.";
      }
    }
  });
}

function submitQuiz(lessonId){
  var lesson = getLesson(lessonId);
  if(!lesson) return;
  var blocks = app.querySelectorAll(".q-block");
  var score = 0;
  var unanswered = false;
  blocks.forEach(function(block){
    var selected = block.querySelector('input[type="radio"]:checked');
    if(!selected){ unanswered = true; return; }
    var answer = block.getAttribute("data-answer");
    if(normalize(selected.value)===normalize(answer)) score++;
  });
  if(unanswered){
    alert("Please answer every question before submitting.");
    return;
  }
  var total = lesson.quiz.length;
  var passed = (score/total) >= 0.7;
  state.completed[lesson.id] = {quizScore:score, quizTotal:total, passed:passed, practiceDone:true};
  saveState();
  location.hash = "#/result/" + lesson.id;
}

/* ---------- Boot ---------- */

window.addEventListener("hashchange", render);
window.addEventListener("DOMContentLoaded", function(){
  if(!location.hash){
    location.hash = state.lastRoute && state.lastRoute!=="#/" ? state.lastRoute : "#/";
  }
  render();
});
