<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MonaLisa Language Academy</title>
<style>

:root{
  --bg:#eef4ff;--navy:#0f1e3d;--accent:#2563eb;--accent-soft:#dbeafe;
  --warm:#f59e0b;--warm-soft:#fef3c7;--teal:#0d9488;
  --text:#1e293b;--text-muted:#64748b;--border:#c7d9f5;
  --success:#059669;--success-bg:#d1fae5;--error:#dc2626;--error-bg:#fee2e2;
  --radius:14px;--shadow:0 4px 20px rgba(37,99,235,.10);
  --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:var(--bg);color:var(--text);font-family:var(--font);line-height:1.6;-webkit-font-smoothing:antialiased;}
a{color:var(--accent);text-decoration:none;}a:hover{text-decoration:underline;}
img{max-width:100%;display:block;}button{font-family:inherit;cursor:pointer;}
:focus-visible{outline:3px solid var(--accent);outline-offset:3px;}
.navbar{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;
  padding:14px 22px;background:#fff;border-bottom:2px solid var(--border);position:sticky;top:0;z-index:100;}
.nav-brand{font-weight:800;font-size:1.1rem;color:var(--navy);}
.nav-brand span{color:var(--accent);}
.nav-links{display:flex;gap:16px;align-items:center;flex-wrap:wrap;}
.nav-links a{color:var(--text);font-size:.92rem;font-weight:500;}
.nav-links a:hover{color:var(--accent);}
.nav-badge{background:var(--accent-soft);color:var(--navy);padding:4px 11px;border-radius:20px;font-size:.78rem;font-weight:700;}
.container{max-width:900px;margin:0 auto;padding:30px 18px 70px;}
.narrow{max-width:700px;}
.card{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:26px;box-shadow:var(--shadow);margin-bottom:20px;}
.eyebrow{font-size:.75rem;letter-spacing:.06em;text-transform:uppercase;color:var(--accent);font-weight:800;margin-bottom:6px;}
h2{color:var(--navy);font-size:1.35rem;font-weight:800;margin-bottom:6px;}
h3{color:var(--navy);font-size:1.05rem;font-weight:700;margin-bottom:10px;}
p.muted,span.muted{color:var(--text-muted);}
.hero{background:linear-gradient(135deg,#dbeafe 0%,#eff6ff 55%,#fff 100%);border-radius:var(--radius);padding:30px 28px 28px;margin-bottom:22px;border:1px solid var(--border);}
.hero h1{font-size:1.9rem;color:var(--navy);font-weight:900;margin-bottom:10px;}
.hero p{color:var(--text-muted);max-width:520px;font-size:1.03rem;}
.hero-img{margin:20px 0;border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);}
.hero-img img{width:100%;height:240px;object-fit:cover;}
.hero-actions{display:flex;gap:12px;flex-wrap:wrap;margin-top:20px;}
.btn{display:inline-block;padding:11px 22px;border-radius:9px;border:none;
  background:linear-gradient(135deg,#2563eb,#1c3361);color:#fff;font-size:.95rem;font-weight:700;transition:filter .15s,transform .1s;}
.btn:hover{filter:brightness(1.1);}
.btn:active{transform:translateY(1px);}
.btn-teal{background:linear-gradient(135deg,#0d9488,#065f46);}
.btn-warm{background:linear-gradient(135deg,#f59e0b,#b45309);}
.btn-secondary{background:#fff;color:var(--navy);border:1.5px solid var(--border);}
.btn-secondary:hover{background:var(--bg);border-color:var(--accent);color:var(--accent);}
.btn-block{display:block;width:100%;text-align:center;}
.level-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(145px,1fr));gap:14px;}
.level-btn{border:1.5px solid var(--border);border-top:4px solid var(--accent);background:#fff;
  border-radius:var(--radius);padding:18px 14px;text-align:left;cursor:pointer;
  transition:border-color .15s,transform .12s,box-shadow .12s;}
.level-btn:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:var(--shadow);}
.level-btn .code{font-weight:800;color:var(--navy);font-size:1.15rem;}
.level-btn .lbl{color:var(--text-muted);font-size:.85rem;margin-top:3px;}
.level-btn .done{color:var(--success);font-size:.82rem;font-weight:700;margin-top:5px;}
.lesson-card{border:1.5px solid var(--border);border-radius:var(--radius);padding:18px;
  display:flex;justify-content:space-between;align-items:center;gap:14px;background:#fff;
  transition:border-color .15s;margin-bottom:10px;}
.lesson-card:hover{border-color:var(--accent);}
.lc-title{font-weight:700;color:var(--navy);}
.lc-meta{color:var(--text-muted);font-size:.84rem;margin-top:2px;}
.progress-track{background:var(--bg);border-radius:20px;height:12px;overflow:hidden;border:1px solid var(--border);}
.progress-fill{background:linear-gradient(90deg,var(--accent),var(--warm));height:100%;border-radius:20px;transition:width .35s ease;}
.progress-row{display:flex;align-items:center;gap:12px;margin:10px 0;}
.progress-row .progress-track{flex:1;}
.pct{font-size:.85rem;color:var(--text-muted);min-width:42px;text-align:right;font-weight:700;}
table.vocab{width:100%;border-collapse:collapse;font-size:.92rem;margin-top:8px;}
table.vocab th,table.vocab td{text-align:left;padding:10px 12px;border-bottom:1px solid var(--border);}
table.vocab th{background:var(--bg);color:var(--navy);font-size:.78rem;text-transform:uppercase;letter-spacing:.04em;font-weight:700;}
table.vocab tr:last-child td{border-bottom:none;}
.t-item{border:1.5px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px;background:#fff;}
.t-src{font-weight:600;color:var(--navy);margin-bottom:8px;}
.t-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.t-item input[type="text"]{flex:1;min-width:160px;padding:9px 11px;border:1.5px solid var(--border);border-radius:8px;font-size:.95rem;font-family:inherit;}
.t-item input[type="text"]:focus{border-color:var(--accent);outline:none;}
.t-chk{padding:9px 14px;background:var(--accent-soft);color:var(--navy);border:1.5px solid var(--accent);border-radius:8px;font-size:.88rem;font-weight:700;}
.t-fb{margin-top:8px;font-size:.88rem;padding:7px 11px;border-radius:8px;display:none;}
.t-fb.ok{display:block;background:var(--success-bg);color:var(--success);}
.t-fb.bad{display:block;background:var(--error-bg);color:var(--error);}
.q-block{border:1.5px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:14px;background:#fff;}
.qt{font-weight:700;color:var(--navy);margin-bottom:12px;}
.opt{display:block;padding:10px 12px;border-radius:8px;margin-bottom:7px;border:1.5px solid var(--border);cursor:pointer;transition:background .12s,border-color .12s;user-select:none;}
.opt:hover{background:var(--bg);}
.opt.sel{border-color:var(--accent);background:var(--accent-soft);}
.q-block input[type="radio"]{margin-right:8px;}
.q-block input[type="text"]{width:100%;padding:9px 11px;border:1.5px solid var(--border);border-radius:8px;font-size:.95rem;font-family:inherit;}
.q-block input[type="text"]:focus{border-color:var(--accent);outline:none;}
.qfb{margin-top:9px;font-size:.88rem;font-weight:700;padding:7px 11px;border-radius:8px;display:none;}
.qfb.ok{display:block;background:var(--success-bg);color:var(--success);}
.qfb.bad{display:block;background:var(--error-bg);color:var(--error);}
.match-row{display:flex;align-items:center;gap:10px;margin-bottom:9px;flex-wrap:wrap;}
.match-row span{min-width:150px;font-weight:600;color:var(--navy);}
.match-row select{flex:1;padding:8px 10px;border:1.5px solid var(--border);border-radius:8px;font-size:.92rem;font-family:inherit;}
.result-score{font-size:2.6rem;color:var(--navy);font-weight:900;margin:8px 0;}
.result-banner{border-radius:var(--radius);padding:20px;margin-bottom:18px;}
.result-banner.pass{background:var(--success-bg);color:var(--success);border-left:5px solid var(--success);}
.result-banner.fail{background:var(--error-bg);color:var(--error);border-left:5px solid var(--error);}
.culture-img{margin:14px 0;overflow:hidden;border-radius:var(--radius);box-shadow:var(--shadow);}
.culture-img img{width:100%;height:210px;object-fit:cover;}
.culture-cap{font-size:.8rem;color:var(--text-muted);margin-top:5px;}
.culture-section{margin-bottom:28px;}
.culture-section ul{padding-left:20px;}
.culture-section ul li{margin-bottom:5px;}
.chat-toggle{position:fixed;bottom:24px;right:24px;z-index:200;width:60px;height:60px;border-radius:50%;
  background:linear-gradient(135deg,#2563eb,#0d9488);border:none;color:#fff;font-size:1.5rem;
  box-shadow:0 6px 24px rgba(37,99,235,.35);display:flex;align-items:center;justify-content:center;transition:transform .15s;}
.chat-toggle:hover{transform:scale(1.08);}
.chat-win{position:fixed;bottom:96px;right:24px;z-index:200;width:340px;max-width:94vw;
  background:#fff;border:1.5px solid var(--border);border-radius:var(--radius);
  box-shadow:0 8px 40px rgba(37,99,235,.18);display:none;flex-direction:column;overflow:hidden;}
.chat-win.open{display:flex;}
.chat-head{background:linear-gradient(135deg,#2563eb,#1c3361);color:#fff;padding:14px 16px;display:flex;justify-content:space-between;align-items:center;}
.ch-title{font-weight:700;font-size:.97rem;}
.ch-close{background:none;border:none;color:#fff;font-size:1.2rem;cursor:pointer;padding:0 4px;line-height:1;}
.chat-msgs{flex:1;overflow-y:auto;padding:14px;max-height:300px;display:flex;flex-direction:column;gap:10px;background:var(--bg);}
.bubble{padding:10px 13px;border-radius:12px;font-size:.88rem;line-height:1.5;max-width:88%;}
.bubble.user{background:var(--accent);color:#fff;align-self:flex-end;border-bottom-right-radius:3px;}
.bubble.bot{background:#fff;color:var(--text);align-self:flex-start;border:1px solid var(--border);border-bottom-left-radius:3px;}
.bubble.thinking{color:var(--text-muted);font-style:italic;}
.chat-input-row{display:flex;gap:8px;padding:12px;border-top:1px solid var(--border);background:#fff;}
.chat-input-row input{flex:1;padding:9px 11px;border:1.5px solid var(--border);border-radius:8px;font-size:.9rem;font-family:inherit;}
.chat-input-row input:focus{border-color:var(--accent);outline:none;}
.chat-input-row button{padding:9px 13px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-weight:700;font-size:.88rem;}
footer{border-top:1px solid var(--border);padding:22px 20px;text-align:center;color:var(--text-muted);font-size:.78rem;background:#fff;}
.gap-row{display:flex;gap:12px;flex-wrap:wrap;margin-top:10px;}
.badge-ok{background:var(--success-bg);color:var(--success);padding:3px 9px;border-radius:20px;font-size:.78rem;font-weight:700;}
.feat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-top:10px;}
.feat-card{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:22px;box-shadow:var(--shadow);}
.feat-icon{font-size:1.8rem;margin-bottom:8px;}

</style>
</head>
<body>
<div id="app"></div>

<!-- Chatbot -->
<button class="chat-toggle" id="chatToggle" aria-label="Open language tutor">&#x1F4AC;</button>
<div class="chat-win" id="chatWin" role="dialog" aria-label="Language tutor">
  <div class="chat-head">
    <span class="ch-title">&#x1F9D1;&#x200D;&#x1F3EB; Language Tutor</span>
    <button class="ch-close" id="chatClose" aria-label="Close">&#x2715;</button>
  </div>
  <div id="chatKeyPanel" style="padding:12px;border-bottom:1px solid var(--border);background:#fff8ed;">
    <div style="font-size:.8rem;color:#92400e;font-weight:700;margin-bottom:6px">&#x1F511; Enter your Anthropic API key to activate the tutor</div>
    <div style="display:flex;gap:8px;">
      <input type="password" id="chatApiKey" placeholder="sk-ant-..." style="flex:1;padding:7px 9px;border:1.5px solid #fcd34d;border-radius:7px;font-size:.85rem;font-family:inherit;">
      <button id="chatKeySave" style="padding:7px 12px;background:#f59e0b;color:#fff;border:none;border-radius:7px;font-size:.82rem;font-weight:700;">Save</button>
    </div>
    <div style="font-size:.75rem;color:#78350f;margin-top:5px">Your key is stored only in your browser and never sent anywhere except directly to Anthropic.</div>
  </div>
  <div class="chat-msgs" id="chatMsgs">
    <div class="bubble bot">Hello! Save your Anthropic API key above, then ask me anything about German or English.</div>
  </div>
  <div class="chat-input-row">
    <input type="text" id="chatIn" placeholder="Ask a question..." aria-label="Chat message">
    <button id="chatSend">Send</button>
  </div>
</div>

<script>

var LESSONS = [{"id": "de-A0-01", "language": "German", "level": "A0", "title": "Greetings and First Words", "intro": "Before anything else, a language gives you ways to say hello and share your name. These are the first words every German learner reaches for, and you will hear them within minutes of arriving in any German-speaking country.", "concept": "German greetings shift depending on the time of day and how formal the situation is. Hallo works almost everywhere, but a doctor's office or business meeting calls for Guten Tag.", "vocabulary": [{"en": "hello", "de": "Hallo", "example": "Hallo, ich heiße Lena."}, {"en": "good morning", "de": "Guten Morgen", "example": "Guten Morgen, Herr Schmidt."}, {"en": "good day", "de": "Guten Tag", "example": "Guten Tag, wie kann ich helfen?"}, {"en": "goodbye", "de": "Auf Wiedersehen", "example": "Auf Wiedersehen und danke."}, {"en": "bye (casual)", "de": "Tschüss", "example": "Tschüss, bis morgen!"}, {"en": "please", "de": "Bitte", "example": "Ein Wasser, bitte."}, {"en": "thank you", "de": "Danke", "example": "Danke für die Hilfe."}, {"en": "my name is", "de": "Ich heiße", "example": "Ich heiße Markus."}], "translations": [{"en": "Hello, my name is Anna.", "de": "Hallo, ich heiße Anna."}, {"en": "Good morning, how are you?", "de": "Guten Morgen, wie geht es dir?"}, {"en": "Thank you very much.", "de": "Vielen Dank."}, {"en": "What is your name?", "de": "Wie heißt du?"}, {"en": "Goodbye, see you soon.", "de": "Auf Wiedersehen, bis bald."}], "practice": [{"type": "mcq", "q": "How do you say hello in German?", "options": ["Hallo", "Tschüss", "Danke", "Bitte"], "answer": "Hallo"}, {"type": "mcq", "q": "Which phrase means good day?", "options": ["Guten Tag", "Guten Morgen", "Auf Wiedersehen", "Ich heiße"], "answer": "Guten Tag"}, {"type": "fill", "q": "Guten ___, Frau Klein. (morning)", "answer": "Morgen"}, {"type": "fill", "q": "Vielen ___ für die Hilfe.", "answer": "Dank"}, {"type": "match", "pairs": [["Hallo", "hello"], ["Tschüss", "bye (casual)"], ["Danke", "thank you"]]}], "quiz": [{"q": "What does Guten Morgen mean?", "options": ["Good morning", "Good night", "Good afternoon", "Goodbye"], "answer": "Good morning"}, {"q": "Choose the correct casual goodbye.", "options": ["Tschüss", "Bitte", "Ich heiße", "Danke"], "answer": "Tschüss"}, {"q": "Complete: Ich ___ Lena.", "options": ["heiße", "bin", "habe", "mache"], "answer": "heiße"}, {"q": "What is the German word for please?", "options": ["Bitte", "Danke", "Hallo", "Tschüss"], "answer": "Bitte"}]}, {"id": "de-A0-02", "language": "German", "level": "A0", "title": "Numbers 1 to 20", "intro": "Numbers come up in every conversation — shopping, giving a phone number, telling someone your age. This lesson takes you from one to twenty step by step.", "concept": "German numbers from one to twelve each have a unique form. From thirteen onward, most follow a pattern based on the word for ten, zehn. Knowing the pattern means you can work out numbers you have never heard before.", "vocabulary": [{"en": "one", "de": "eins", "example": "Ich habe eins."}, {"en": "two", "de": "zwei", "example": "Zwei Kaffee, bitte."}, {"en": "three", "de": "drei", "example": "Drei Äpfel kosten zwei Euro."}, {"en": "ten", "de": "zehn", "example": "Ich bin zehn Jahre alt."}, {"en": "thirteen", "de": "dreizehn", "example": "Dreizehn Schüler sind heute hier."}, {"en": "fifteen", "de": "fünfzehn", "example": "Es ist fünfzehn Uhr."}, {"en": "twenty", "de": "zwanzig", "example": "Ich bin zwanzig Jahre alt."}], "translations": [{"en": "I am twenty years old.", "de": "Ich bin zwanzig Jahre alt."}, {"en": "Two coffees, please.", "de": "Zwei Kaffee, bitte."}, {"en": "It is fifteen o'clock.", "de": "Es ist fünfzehn Uhr."}, {"en": "I have one apple.", "de": "Ich habe einen Apfel."}, {"en": "There are thirteen students here.", "de": "Dreizehn Schüler sind heute hier."}], "practice": [{"type": "mcq", "q": "What is the German word for ten?", "options": ["zehn", "drei", "zwanzig", "fünf"], "answer": "zehn"}, {"type": "mcq", "q": "Which number is dreizehn?", "options": ["13", "30", "3", "33"], "answer": "13"}, {"type": "fill", "q": "Zwei ___ bitte. (coffees)", "answer": "Kaffee"}, {"type": "fill", "q": "Ich bin ___ Jahre alt. (twenty)", "answer": "zwanzig"}, {"type": "match", "pairs": [["eins", "one"], ["zwei", "two"], ["zehn", "ten"]]}], "quiz": [{"q": "What is the German word for twenty?", "options": ["zwanzig", "zwölf", "zehn", "dreißig"], "answer": "zwanzig"}, {"q": "How do you say fifteen in German?", "options": ["fünfzehn", "fünf", "fünfzig", "zehnfünf"], "answer": "fünfzehn"}, {"q": "Which number does -zehn relate to?", "options": ["ten", "five", "three", "eight"], "answer": "ten"}, {"q": "What does drei mean?", "options": ["three", "thirty", "thirteen", "two"], "answer": "three"}]}, {"id": "de-A0-03", "language": "German", "level": "A0", "title": "Colors and Basic Adjectives", "intro": "Colors and simple describing words let you paint a picture of the world around you. Even at the very beginning, these words make your sentences feel much more alive.", "concept": "In German, adjectives used after the verb sein do not change their ending. Das Auto ist rot is straightforward. Adjective endings become more complex when placed before a noun, but that comes in a later lesson.", "vocabulary": [{"en": "red", "de": "rot", "example": "Das Auto ist rot."}, {"en": "blue", "de": "blau", "example": "Der Himmel ist blau."}, {"en": "green", "de": "grün", "example": "Das Gras ist grün."}, {"en": "white", "de": "weiß", "example": "Die Wand ist weiß."}, {"en": "big", "de": "groß", "example": "Das Haus ist groß."}, {"en": "small", "de": "klein", "example": "Das Kind ist klein."}, {"en": "beautiful", "de": "schön", "example": "Die Stadt ist schön."}], "translations": [{"en": "The car is red.", "de": "Das Auto ist rot."}, {"en": "The sky is blue.", "de": "Der Himmel ist blau."}, {"en": "The house is big.", "de": "Das Haus ist groß."}, {"en": "The child is small.", "de": "Das Kind ist klein."}, {"en": "The city is beautiful.", "de": "Die Stadt ist schön."}], "practice": [{"type": "mcq", "q": "What is the German word for blue?", "options": ["blau", "rot", "grün", "weiß"], "answer": "blau"}, {"type": "mcq", "q": "Choose the correct adjective for big.", "options": ["groß", "klein", "schön", "rot"], "answer": "groß"}, {"type": "fill", "q": "Der Himmel ist ___. (blue)", "answer": "blau"}, {"type": "fill", "q": "Das Kind ist ___. (small)", "answer": "klein"}, {"type": "match", "pairs": [["rot", "red"], ["grün", "green"], ["schön", "beautiful"]]}], "quiz": [{"q": "What does weiß mean?", "options": ["white", "black", "yellow", "grey"], "answer": "white"}, {"q": "Complete: Das Auto ist ___.", "options": ["rot", "blau", "klein", "groß"], "answer": "rot"}, {"q": "Which adjective means beautiful?", "options": ["schön", "groß", "rot", "blau"], "answer": "schön"}, {"q": "How do you say the sky is blue?", "options": ["Der Himmel ist blau.", "Der Himmel ist rot.", "Das Himmel ist blau.", "Die Himmel blau ist."], "answer": "Der Himmel ist blau."}]}, {"id": "de-A1-01", "language": "German", "level": "A1", "title": "Daily Routines", "intro": "Once you can greet someone, the next step is describing what you do from morning to evening. Present tense verbs are the foundation of everyday conversation.", "concept": "German present tense verbs change their ending to match the subject. With ich you use the stem, with er or sie you add a t. Time expressions like jeden Tag usually follow the verb.", "vocabulary": [{"en": "to get up", "de": "aufstehen", "example": "Ich stehe um sieben auf."}, {"en": "to work", "de": "arbeiten", "example": "Er arbeitet jeden Tag."}, {"en": "to eat", "de": "essen", "example": "Wir essen um zwölf."}, {"en": "to sleep", "de": "schlafen", "example": "Sie schläft früh."}, {"en": "every day", "de": "jeden Tag", "example": "Ich lerne jeden Tag Deutsch."}, {"en": "early", "de": "früh", "example": "Ich stehe früh auf."}, {"en": "late", "de": "spät", "example": "Er kommt spät nach Hause."}], "translations": [{"en": "I get up at seven.", "de": "Ich stehe um sieben auf."}, {"en": "She works every day.", "de": "Sie arbeitet jeden Tag."}, {"en": "We eat at noon.", "de": "Wir essen um zwölf."}, {"en": "He sleeps early.", "de": "Er schläft früh."}, {"en": "I learn German every day.", "de": "Ich lerne jeden Tag Deutsch."}], "practice": [{"type": "mcq", "q": "Complete: Ich ___ um sieben auf.", "options": ["stehe", "steht", "stehen", "stehst"], "answer": "stehe"}, {"type": "mcq", "q": "Which word means every day?", "options": ["jeden Tag", "spät", "früh", "heute"], "answer": "jeden Tag"}, {"type": "fill", "q": "Er ___ jeden Tag. (arbeiten)", "answer": "arbeitet"}, {"type": "fill", "q": "Wir ___ um zwölf. (essen)", "answer": "essen"}, {"type": "match", "pairs": [["aufstehen", "to get up"], ["schlafen", "to sleep"], ["arbeiten", "to work"]]}], "quiz": [{"q": "What is the correct er form of arbeiten?", "options": ["arbeitet", "arbeite", "arbeiten", "arbeitest"], "answer": "arbeitet"}, {"q": "Which word means early?", "options": ["früh", "spät", "jeden Tag", "heute"], "answer": "früh"}, {"q": "Complete: Sie ___ früh.", "options": ["schläft", "schlafe", "schlafen", "schläfst"], "answer": "schläft"}, {"q": "What does jeden Tag mean?", "options": ["every day", "every week", "sometimes", "never"], "answer": "every day"}]}, {"id": "de-A1-02", "language": "German", "level": "A1", "title": "Ordering at a Café", "intro": "German cafés are a big part of daily life. Knowing how to order confidently, say what you like, and understand the menu makes the whole experience far more enjoyable.", "concept": "When ordering, German speakers often go straight to the noun with an article. Ich hätte gern einen Kaffee is slightly more polite than Ich möchte, but both are perfectly fine in any café.", "vocabulary": [{"en": "coffee", "de": "der Kaffee", "example": "Ich hätte gern einen Kaffee."}, {"en": "bread", "de": "das Brot", "example": "Ein Brot mit Butter, bitte."}, {"en": "water", "de": "das Wasser", "example": "Ein Glas Wasser, bitte."}, {"en": "the bill", "de": "die Rechnung", "example": "Die Rechnung, bitte."}, {"en": "delicious", "de": "lecker", "example": "Das Essen ist sehr lecker."}, {"en": "I would like", "de": "Ich hätte gern", "example": "Ich hätte gern eine Suppe."}, {"en": "without", "de": "ohne", "example": "Einen Kaffee ohne Zucker."}], "translations": [{"en": "I would like a coffee.", "de": "Ich hätte gern einen Kaffee."}, {"en": "A bread with butter, please.", "de": "Ein Brot mit Butter, bitte."}, {"en": "The bill, please.", "de": "Die Rechnung, bitte."}, {"en": "The food is very delicious.", "de": "Das Essen ist sehr lecker."}, {"en": "A coffee without sugar.", "de": "Einen Kaffee ohne Zucker."}], "practice": [{"type": "mcq", "q": "How do you politely say I would like?", "options": ["Ich hätte gern", "Ich muss", "Ich bin", "Ich habe"], "answer": "Ich hätte gern"}, {"type": "mcq", "q": "What is die Rechnung?", "options": ["the bill", "the menu", "the bread", "the water"], "answer": "the bill"}, {"type": "fill", "q": "Ein Glas ___, bitte. (water)", "answer": "Wasser"}, {"type": "fill", "q": "Das Essen ist sehr ___. (delicious)", "answer": "lecker"}, {"type": "match", "pairs": [["der Kaffee", "coffee"], ["das Brot", "bread"], ["ohne", "without"]]}], "quiz": [{"q": "What does lecker mean?", "options": ["delicious", "bitter", "cold", "expensive"], "answer": "delicious"}, {"q": "How do you ask for the bill?", "options": ["Die Rechnung, bitte.", "Das Wasser, bitte.", "Ein Kaffee, bitte.", "Das Brot, bitte."], "answer": "Die Rechnung, bitte."}, {"q": "Complete: Ich hätte gern ___ Kaffee.", "options": ["einen", "eine", "ein", "einem"], "answer": "einen"}, {"q": "Which word means without?", "options": ["ohne", "mit", "und", "oder"], "answer": "ohne"}]}, {"id": "de-A1-03", "language": "German", "level": "A1", "title": "Asking for Directions", "intro": "Getting around a new city in German is one of the most practical skills you can build early on. This lesson gives you the phrases to ask where something is and understand a simple answer.", "concept": "German direction sentences use prepositions with the dative case. For now, focus on learning the set phrases as complete units rather than analyzing each word individually.", "vocabulary": [{"en": "where is", "de": "Wo ist", "example": "Wo ist der Bahnhof?"}, {"en": "straight ahead", "de": "geradeaus", "example": "Gehen Sie geradeaus."}, {"en": "turn left", "de": "links abbiegen", "example": "Biegen Sie links ab."}, {"en": "turn right", "de": "rechts abbiegen", "example": "Biegen Sie rechts ab."}, {"en": "train station", "de": "der Bahnhof", "example": "Der Bahnhof ist in der Mitte."}, {"en": "near", "de": "in der Nähe", "example": "Das Hotel ist in der Nähe."}, {"en": "on the corner", "de": "an der Ecke", "example": "Das Café ist an der Ecke."}], "translations": [{"en": "Where is the train station?", "de": "Wo ist der Bahnhof?"}, {"en": "Go straight ahead.", "de": "Gehen Sie geradeaus."}, {"en": "Turn left.", "de": "Biegen Sie links ab."}, {"en": "The café is on the corner.", "de": "Das Café ist an der Ecke."}, {"en": "The hotel is nearby.", "de": "Das Hotel ist in der Nähe."}], "practice": [{"type": "mcq", "q": "How do you ask where something is?", "options": ["Wo ist", "Was ist", "Wer ist", "Wann ist"], "answer": "Wo ist"}, {"type": "mcq", "q": "What does geradeaus mean?", "options": ["straight ahead", "turn left", "nearby", "on the corner"], "answer": "straight ahead"}, {"type": "fill", "q": "Biegen Sie ___ ab. (left)", "answer": "links"}, {"type": "fill", "q": "Das Café ist an der ___. (corner)", "answer": "Ecke"}, {"type": "match", "pairs": [["der Bahnhof", "train station"], ["in der Nähe", "near"], ["rechts", "right"]]}], "quiz": [{"q": "What does Wo ist mean?", "options": ["where is", "what is", "who is", "when is"], "answer": "where is"}, {"q": "Complete: Gehen Sie ___.", "options": ["geradeaus", "links", "rechts", "um"], "answer": "geradeaus"}, {"q": "Which phrase means on the corner?", "options": ["an der Ecke", "in der Nähe", "geradeaus", "links abbiegen"], "answer": "an der Ecke"}, {"q": "What is the German word for train station?", "options": ["der Bahnhof", "das Café", "das Hotel", "die Ecke"], "answer": "der Bahnhof"}]}, {"id": "de-A2-01", "language": "German", "level": "A2", "title": "Making Plans with Modal Verbs", "intro": "Modal verbs open up a whole new layer of meaning. With them you can suggest, ask, agree, decline, and express wishes with ease.", "concept": "Möchten and können both pair with an infinitive at the end of the sentence. Möchten expresses a wish; können expresses ability or possibility.", "vocabulary": [{"en": "would like to", "de": "möchten", "example": "Ich möchte ins Kino gehen."}, {"en": "can", "de": "können", "example": "Wir können morgen schwimmen."}, {"en": "weekend", "de": "das Wochenende", "example": "Was machst du am Wochenende?"}, {"en": "maybe", "de": "vielleicht", "example": "Vielleicht gehen wir wandern."}, {"en": "together", "de": "zusammen", "example": "Wir treffen uns zusammen."}, {"en": "cinema", "de": "das Kino", "example": "Gehen wir ins Kino?"}, {"en": "to suggest", "de": "vorschlagen", "example": "Darf ich etwas vorschlagen?"}], "translations": [{"en": "I would like to go to the cinema.", "de": "Ich möchte ins Kino gehen."}, {"en": "Can we meet on Saturday?", "de": "Können wir uns am Samstag treffen?"}, {"en": "Maybe we will go hiking.", "de": "Vielleicht gehen wir wandern."}, {"en": "What are your plans for the weekend?", "de": "Was sind deine Pläne für das Wochenende?"}, {"en": "We can swim together.", "de": "Wir können zusammen schwimmen."}], "practice": [{"type": "mcq", "q": "Complete: Ich ___ ins Kino gehen.", "options": ["möchte", "möchten", "möchtest", "möchtet"], "answer": "möchte"}, {"type": "mcq", "q": "What is the German word for weekend?", "options": ["das Wochenende", "der Plan", "das Kino", "vielleicht"], "answer": "das Wochenende"}, {"type": "fill", "q": "Wir ___ morgen schwimmen. (können)", "answer": "können"}, {"type": "fill", "q": "___ gehen wir wandern. (maybe)", "answer": "Vielleicht"}, {"type": "match", "pairs": [["möchten", "would like to"], ["können", "can"], ["zusammen", "together"]]}], "quiz": [{"q": "What does möchten mean?", "options": ["would like to", "can", "have to", "should"], "answer": "would like to"}, {"q": "Complete: Wir ___ morgen schwimmen.", "options": ["können", "kann", "könnt", "könnte"], "answer": "können"}, {"q": "Which word means maybe?", "options": ["vielleicht", "zusammen", "das Kino", "der Plan"], "answer": "vielleicht"}, {"q": "What is the correct meaning of zusammen?", "options": ["together", "maybe", "can", "plan"], "answer": "together"}]}, {"id": "de-A2-02", "language": "German", "level": "A2", "title": "Shopping and Prices", "intro": "Whether you are at a market in Munich or a bakery in Vienna, knowing how to ask prices and understand responses makes a real difference.", "concept": "Asking how much something costs uses the verb kosten. Was kostet das? is the standard question. The verb does not change when referring to one item.", "vocabulary": [{"en": "how much does it cost", "de": "Was kostet das?", "example": "Was kostet das Buch?"}, {"en": "expensive", "de": "teuer", "example": "Das ist zu teuer."}, {"en": "cheap", "de": "günstig", "example": "Das Hemd ist günstig."}, {"en": "I will take it", "de": "Ich nehme das.", "example": "Ich nehme das Hemd."}, {"en": "cash", "de": "bar", "example": "Kann ich bar zahlen?"}, {"en": "the price", "de": "der Preis", "example": "Der Preis ist fair."}, {"en": "discount", "de": "der Rabatt", "example": "Gibt es einen Rabatt?"}], "translations": [{"en": "How much does the book cost?", "de": "Was kostet das Buch?"}, {"en": "That is too expensive.", "de": "Das ist zu teuer."}, {"en": "I will take the shirt.", "de": "Ich nehme das Hemd."}, {"en": "Can I pay cash?", "de": "Kann ich bar zahlen?"}, {"en": "Is there a discount?", "de": "Gibt es einen Rabatt?"}], "practice": [{"type": "mcq", "q": "How do you ask the price?", "options": ["Was kostet das?", "Wo ist das?", "Wann ist das?", "Wer ist das?"], "answer": "Was kostet das?"}, {"type": "mcq", "q": "Which word means expensive?", "options": ["teuer", "günstig", "fair", "billig"], "answer": "teuer"}, {"type": "fill", "q": "Das ist zu ___. (expensive)", "answer": "teuer"}, {"type": "fill", "q": "Gibt es einen ___? (discount)", "answer": "Rabatt"}, {"type": "match", "pairs": [["günstig", "cheap"], ["bar", "cash"], ["der Preis", "the price"]]}], "quiz": [{"q": "What does günstig mean?", "options": ["cheap", "expensive", "discount", "price"], "answer": "cheap"}, {"q": "How do you say I will take it?", "options": ["Ich nehme das.", "Ich kaufe das.", "Ich sehe das.", "Ich gehe das."], "answer": "Ich nehme das."}, {"q": "Complete: Kann ich ___ zahlen?", "options": ["bar", "teuer", "der Preis", "günstig"], "answer": "bar"}, {"q": "What is the German word for discount?", "options": ["der Rabatt", "der Preis", "das Hemd", "die Kasse"], "answer": "der Rabatt"}]}, {"id": "de-A2-03", "language": "German", "level": "A2", "title": "Describing Your Home", "intro": "Describing where you live comes up quickly when you meet new people. This lesson gives you the vocabulary to talk about rooms, furniture, and the feel of a place.", "concept": "In German, es gibt followed by the accusative case means there is or there are. You will also use haben to say what your home has.", "vocabulary": [{"en": "living room", "de": "das Wohnzimmer", "example": "Das Wohnzimmer ist groß."}, {"en": "bedroom", "de": "das Schlafzimmer", "example": "Mein Schlafzimmer ist ruhig."}, {"en": "kitchen", "de": "die Küche", "example": "Die Küche ist modern."}, {"en": "balcony", "de": "der Balkon", "example": "Wir haben einen Balkon."}, {"en": "cosy", "de": "gemütlich", "example": "Die Wohnung ist sehr gemütlich."}, {"en": "there is", "de": "es gibt", "example": "Es gibt einen Keller."}, {"en": "flat", "de": "die Wohnung", "example": "Ich wohne in einer kleinen Wohnung."}], "translations": [{"en": "The living room is big.", "de": "Das Wohnzimmer ist groß."}, {"en": "My bedroom is quiet.", "de": "Mein Schlafzimmer ist ruhig."}, {"en": "The kitchen is modern.", "de": "Die Küche ist modern."}, {"en": "We have a balcony.", "de": "Wir haben einen Balkon."}, {"en": "The flat is very cosy.", "de": "Die Wohnung ist sehr gemütlich."}], "practice": [{"type": "mcq", "q": "What is das Wohnzimmer?", "options": ["living room", "bedroom", "kitchen", "balcony"], "answer": "living room"}, {"type": "mcq", "q": "Which word means cosy?", "options": ["gemütlich", "modern", "ruhig", "groß"], "answer": "gemütlich"}, {"type": "fill", "q": "Mein Schlafzimmer ist ___. (quiet)", "answer": "ruhig"}, {"type": "fill", "q": "Es ___ einen Keller. (there is)", "answer": "gibt"}, {"type": "match", "pairs": [["die Küche", "kitchen"], ["der Balkon", "balcony"], ["die Wohnung", "flat"]]}], "quiz": [{"q": "What does gemütlich mean?", "options": ["cosy", "modern", "quiet", "large"], "answer": "cosy"}, {"q": "How do you say there is in German?", "options": ["es gibt", "es hat", "es ist", "es macht"], "answer": "es gibt"}, {"q": "What is die Küche?", "options": ["kitchen", "living room", "bedroom", "balcony"], "answer": "kitchen"}, {"q": "Complete: Ich wohne in einer kleinen ___.", "options": ["Wohnung", "Küche", "Balkon", "Zimmer"], "answer": "Wohnung"}]}, {"id": "de-B1-01", "language": "German", "level": "B1", "title": "Talking About the Past", "intro": "At B1 level, you want to tell real stories and describe what happened. The Perfekt tense is the one most German speakers use in everyday conversation to talk about the past.", "concept": "Perfekt is formed with haben or sein plus a past participle at the end of the clause. Movement verbs and verbs signaling a change of state typically take sein.", "vocabulary": [{"en": "done", "de": "gemacht", "example": "Ich habe die Hausaufgaben gemacht."}, {"en": "been", "de": "gewesen", "example": "Ich bin in Berlin gewesen."}, {"en": "traveled", "de": "gefahren", "example": "Wir sind nach München gefahren."}, {"en": "seen", "de": "gesehen", "example": "Hast du den Film gesehen?"}, {"en": "last year", "de": "letztes Jahr", "example": "Letztes Jahr war ich in Wien."}, {"en": "experience", "de": "die Erfahrung", "example": "Das war eine tolle Erfahrung."}, {"en": "to tell", "de": "erzählen", "example": "Erzähl mir von deiner Reise."}], "translations": [{"en": "I have done my homework.", "de": "Ich habe meine Hausaufgaben gemacht."}, {"en": "We traveled to Munich.", "de": "Wir sind nach München gefahren."}, {"en": "Have you seen this film?", "de": "Hast du diesen Film gesehen?"}, {"en": "That was a great experience.", "de": "Das war eine tolle Erfahrung."}, {"en": "Tell me about your trip.", "de": "Erzähl mir von deiner Reise."}], "practice": [{"type": "mcq", "q": "Choose the correct participle of sehen.", "options": ["gesehen", "gesehn", "sehen", "sieht"], "answer": "gesehen"}, {"type": "mcq", "q": "Which helping verb goes with fahren?", "options": ["sein", "haben", "werden", "können"], "answer": "sein"}, {"type": "fill", "q": "Ich habe meine Hausaufgaben ___. (machen)", "answer": "gemacht"}, {"type": "fill", "q": "Wir sind nach Rom ___. (fahren)", "answer": "gefahren"}, {"type": "match", "pairs": [["gemacht", "done"], ["gewesen", "been"], ["gefahren", "traveled"]]}], "quiz": [{"q": "Which helping verb pairs with gewesen?", "options": ["sein", "haben", "werden", "müssen"], "answer": "sein"}, {"q": "What does letztes Jahr mean?", "options": ["last year", "next year", "this week", "every year"], "answer": "last year"}, {"q": "Complete: Hast du den Film ___?", "options": ["gesehen", "sehen", "siehst", "sah"], "answer": "gesehen"}, {"q": "What is the correct translation of die Erfahrung?", "options": ["experience", "plan", "trip", "homework"], "answer": "experience"}]}, {"id": "de-B1-02", "language": "German", "level": "B1", "title": "Giving Advice", "intro": "Being able to give advice is a sign of real conversational maturity. This lesson covers the structures Germans use when recommending something or suggesting what someone should do.", "concept": "Sollte is the Konjunktiv II of sollen and is the most natural way to say should in German advice. Du solltest mehr schlafen sounds caring and realistic.", "vocabulary": [{"en": "you should", "de": "du solltest", "example": "Du solltest mehr trinken."}, {"en": "I recommend", "de": "Ich empfehle", "example": "Ich empfehle das Restaurant."}, {"en": "useful", "de": "nützlich", "example": "Das ist sehr nützlich."}, {"en": "to rest", "de": "sich ausruhen", "example": "Du solltest dich ausruhen."}, {"en": "tip", "de": "der Tipp", "example": "Hast du einen Tipp für mich?"}, {"en": "it makes sense", "de": "es macht Sinn", "example": "Es macht Sinn, früh aufzustehen."}, {"en": "healthy", "de": "gesund", "example": "Das Essen ist gesund."}], "translations": [{"en": "You should drink more.", "de": "Du solltest mehr trinken."}, {"en": "I recommend the restaurant.", "de": "Ich empfehle das Restaurant."}, {"en": "You should rest.", "de": "Du solltest dich ausruhen."}, {"en": "Do you have a tip for me?", "de": "Hast du einen Tipp für mich?"}, {"en": "It makes sense to get up early.", "de": "Es macht Sinn, früh aufzustehen."}], "practice": [{"type": "mcq", "q": "How do you say you should in German?", "options": ["du solltest", "ich empfehle", "es macht Sinn", "du kannst"], "answer": "du solltest"}, {"type": "mcq", "q": "Which word means useful?", "options": ["nützlich", "gesund", "nötig", "wichtig"], "answer": "nützlich"}, {"type": "fill", "q": "Du solltest mehr ___. (drink)", "answer": "trinken"}, {"type": "fill", "q": "Ich ___ das Buch. (recommend)", "answer": "empfehle"}, {"type": "match", "pairs": [["gesund", "healthy"], ["der Tipp", "tip"], ["sich ausruhen", "to rest"]]}], "quiz": [{"q": "What does du solltest mean?", "options": ["you should", "you can", "you must", "you have"], "answer": "you should"}, {"q": "How do you say healthy in German?", "options": ["gesund", "nützlich", "wichtig", "ruhig"], "answer": "gesund"}, {"q": "Complete: Es macht ___, früh aufzustehen.", "options": ["Sinn", "gut", "viel", "Zeit"], "answer": "Sinn"}, {"q": "What does Ich empfehle mean?", "options": ["I recommend", "I need", "I try", "I suggest not"], "answer": "I recommend"}]}, {"id": "de-B1-03", "language": "German", "level": "B1", "title": "Describing Personality", "intro": "Describing what someone is like goes well beyond appearance. This lesson builds the vocabulary to talk about character, behavior, and the impression a person makes.", "concept": "German personality adjectives work just like other adjectives after the verb sein. Sie ist freundlich is all you need for a simple description. Pairing adjectives with aber shows contrast.", "vocabulary": [{"en": "friendly", "de": "freundlich", "example": "Er ist sehr freundlich."}, {"en": "patient", "de": "geduldig", "example": "Sie ist immer geduldig."}, {"en": "hardworking", "de": "fleißig", "example": "Mein Bruder ist sehr fleißig."}, {"en": "funny", "de": "lustig", "example": "Meine Freundin ist lustig."}, {"en": "honest", "de": "ehrlich", "example": "Er ist ehrlich und direkt."}, {"en": "shy", "de": "schüchtern", "example": "Das Kind ist schüchtern."}, {"en": "confident", "de": "selbstbewusst", "example": "Sie tritt selbstbewusst auf."}], "translations": [{"en": "He is very friendly.", "de": "Er ist sehr freundlich."}, {"en": "She is always patient.", "de": "Sie ist immer geduldig."}, {"en": "My brother is very hardworking.", "de": "Mein Bruder ist sehr fleißig."}, {"en": "She is honest and direct.", "de": "Sie ist ehrlich und direkt."}, {"en": "The child is shy.", "de": "Das Kind ist schüchtern."}], "practice": [{"type": "mcq", "q": "Which word means patient?", "options": ["geduldig", "fleißig", "ehrlich", "lustig"], "answer": "geduldig"}, {"type": "mcq", "q": "How do you say funny?", "options": ["lustig", "schüchtern", "selbstbewusst", "freundlich"], "answer": "lustig"}, {"type": "fill", "q": "Er ist sehr ___. (friendly)", "answer": "freundlich"}, {"type": "fill", "q": "Mein Bruder ist sehr ___. (hardworking)", "answer": "fleißig"}, {"type": "match", "pairs": [["ehrlich", "honest"], ["schüchtern", "shy"], ["selbstbewusst", "confident"]]}], "quiz": [{"q": "What does geduldig mean?", "options": ["patient", "funny", "shy", "honest"], "answer": "patient"}, {"q": "Which word describes a confident person?", "options": ["selbstbewusst", "schüchtern", "geduldig", "freundlich"], "answer": "selbstbewusst"}, {"q": "Complete: Sie ist immer ___.", "options": ["geduldig", "lustig", "fleißig", "ehrlich"], "answer": "geduldig"}, {"q": "What is the German word for funny?", "options": ["lustig", "schüchtern", "freundlich", "fleißig"], "answer": "lustig"}]}, {"id": "de-B2-01", "language": "German", "level": "B2", "title": "Expressing Opinions and Arguments", "intro": "At B2 level, you can build real arguments. This lesson focuses on the connectors that introduce reasons and opinions.", "concept": "Weil and dass both send the conjugated verb to the end of the clause. Weil introduces a reason, dass introduces a fact or belief after verbs like glauben or finden.", "vocabulary": [{"en": "in my opinion", "de": "meiner Meinung nach", "example": "Meiner Meinung nach ist das wichtig."}, {"en": "because", "de": "weil", "example": "Ich bleibe zu Hause, weil es regnet."}, {"en": "that", "de": "dass", "example": "Ich glaube, dass er recht hat."}, {"en": "advantage", "de": "der Vorteil", "example": "Das hat einen großen Vorteil."}, {"en": "disadvantage", "de": "der Nachteil", "example": "Es gibt auch einen Nachteil."}, {"en": "on one hand", "de": "einerseits", "example": "Einerseits ist es teuer, andererseits nützlich."}, {"en": "to argue", "de": "argumentieren", "example": "Sie argumentiert klar und logisch."}], "translations": [{"en": "In my opinion, this is important.", "de": "Meiner Meinung nach ist das wichtig."}, {"en": "I stay home because it is raining.", "de": "Ich bleibe zu Hause, weil es regnet."}, {"en": "I believe that he is right.", "de": "Ich glaube, dass er recht hat."}, {"en": "This has a clear advantage.", "de": "Das hat einen klaren Vorteil."}, {"en": "On one hand expensive, on the other useful.", "de": "Einerseits ist es teuer, andererseits ist es nützlich."}], "practice": [{"type": "mcq", "q": "Where does the verb go in a weil clause?", "options": ["at the end", "at the start", "right after weil", "stays the same"], "answer": "at the end"}, {"type": "mcq", "q": "Which word introduces a reason?", "options": ["weil", "dass", "und", "aber"], "answer": "weil"}, {"type": "fill", "q": "Ich glaube, ___ er recht hat.", "answer": "dass"}, {"type": "fill", "q": "Das hat einen großen ___. (Vorteil)", "answer": "Vorteil"}, {"type": "match", "pairs": [["der Vorteil", "advantage"], ["der Nachteil", "disadvantage"], ["argumentieren", "to argue"]]}], "quiz": [{"q": "What does meiner Meinung nach mean?", "options": ["in my opinion", "in general", "for example", "on the other hand"], "answer": "in my opinion"}, {"q": "Complete: Ich bleibe zu Hause, ___ es regnet.", "options": ["weil", "dass", "und", "aber"], "answer": "weil"}, {"q": "What does der Nachteil mean?", "options": ["disadvantage", "advantage", "experience", "opinion"], "answer": "disadvantage"}, {"q": "In a dass clause, where does the verb go?", "options": ["at the end", "right after dass", "at the start", "before dass"], "answer": "at the end"}]}, {"id": "de-B2-02", "language": "German", "level": "B2", "title": "Media and Current Events", "intro": "Discussing the news and media in German is a practical goal for B2 learners. This lesson covers the vocabulary you need to talk about what you read, watch, and form opinions on.", "concept": "The passive voice (werden plus past participle) is very common in news German. Die Entscheidung wurde gestern getroffen means the decision was made yesterday. Recognizing this structure helps you follow news articles naturally.", "vocabulary": [{"en": "news", "de": "die Nachrichten", "example": "Ich schaue jeden Abend die Nachrichten."}, {"en": "article", "de": "der Artikel", "example": "Ich habe den Artikel gelesen."}, {"en": "it was reported", "de": "es wurde berichtet", "example": "Es wurde berichtet, dass die Preise steigen."}, {"en": "social media", "de": "die sozialen Medien", "example": "Die sozialen Medien beeinflussen die Meinung."}, {"en": "to influence", "de": "beeinflussen", "example": "Werbung kann uns beeinflussen."}, {"en": "journalism", "de": "der Journalismus", "example": "Guter Journalismus ist wichtig."}, {"en": "opinion piece", "de": "der Kommentar", "example": "Der Kommentar war sehr kritisch."}], "translations": [{"en": "I watch the news every evening.", "de": "Ich schaue jeden Abend die Nachrichten."}, {"en": "I read the article.", "de": "Ich habe den Artikel gelesen."}, {"en": "It was reported that prices are rising.", "de": "Es wurde berichtet, dass die Preise steigen."}, {"en": "Social media influences opinions.", "de": "Die sozialen Medien beeinflussen die Meinung."}, {"en": "Good journalism is important.", "de": "Guter Journalismus ist wichtig."}], "practice": [{"type": "mcq", "q": "What are die Nachrichten?", "options": ["the news", "the articles", "social media", "journalism"], "answer": "the news"}, {"type": "mcq", "q": "Which structure shows passive voice in German?", "options": ["werden + participle", "sein + participle", "haben + participle", "machen + participle"], "answer": "werden + participle"}, {"type": "fill", "q": "Es wurde ___, dass die Preise steigen. (reported)", "answer": "berichtet"}, {"type": "fill", "q": "Guter ___ ist wichtig. (journalism)", "answer": "Journalismus"}, {"type": "match", "pairs": [["der Artikel", "article"], ["beeinflussen", "to influence"], ["der Kommentar", "opinion piece"]]}], "quiz": [{"q": "What does beeinflussen mean?", "options": ["to influence", "to report", "to read", "to watch"], "answer": "to influence"}, {"q": "Which phrase means it was reported?", "options": ["es wurde berichtet", "es ist berichtet", "es hat berichtet", "es wird berichtet"], "answer": "es wurde berichtet"}, {"q": "What are die sozialen Medien?", "options": ["social media", "news", "articles", "journalism"], "answer": "social media"}, {"q": "How do you say I read the article?", "options": ["Ich habe den Artikel gelesen.", "Ich lese den Artikel.", "Ich habe den Artikel geschrieben.", "Ich schaue den Artikel."], "answer": "Ich habe den Artikel gelesen."}]}, {"id": "de-B2-03", "language": "German", "level": "B2", "title": "Work and Career Language", "intro": "The vocabulary of professional life in German is essential for anyone who wants to work or study in a German-speaking country.", "concept": "German professional communication tends to be more formal than in English, especially in writing. Using Sie consistently and choosing the right register signal that you take the interaction seriously.", "vocabulary": [{"en": "application", "de": "die Bewerbung", "example": "Ich habe eine Bewerbung geschickt."}, {"en": "experience", "de": "die Erfahrung", "example": "Ich habe drei Jahre Erfahrung."}, {"en": "salary", "de": "das Gehalt", "example": "Das Gehalt ist verhandelbar."}, {"en": "team", "de": "das Team", "example": "Ich arbeite gern im Team."}, {"en": "to apply", "de": "sich bewerben", "example": "Ich möchte mich bewerben."}, {"en": "qualification", "de": "die Qualifikation", "example": "Welche Qualifikationen haben Sie?"}, {"en": "interview", "de": "das Vorstellungsgespräch", "example": "Das Vorstellungsgespräch war schwierig."}], "translations": [{"en": "I sent an application.", "de": "Ich habe eine Bewerbung geschickt."}, {"en": "I have three years of experience.", "de": "Ich habe drei Jahre Erfahrung."}, {"en": "The salary is negotiable.", "de": "Das Gehalt ist verhandelbar."}, {"en": "I would like to apply.", "de": "Ich möchte mich bewerben."}, {"en": "The interview was difficult.", "de": "Das Vorstellungsgespräch war schwierig."}], "practice": [{"type": "mcq", "q": "What is die Bewerbung?", "options": ["application", "interview", "salary", "qualification"], "answer": "application"}, {"type": "mcq", "q": "Which phrase means to apply?", "options": ["sich bewerben", "sich ausruhen", "sich treffen", "sich vorstellen"], "answer": "sich bewerben"}, {"type": "fill", "q": "Das Gehalt ist ___. (negotiable)", "answer": "verhandelbar"}, {"type": "fill", "q": "Das ___ war schwierig. (interview)", "answer": "Vorstellungsgespräch"}, {"type": "match", "pairs": [["die Qualifikation", "qualification"], ["das Team", "team"], ["die Erfahrung", "experience"]]}], "quiz": [{"q": "What does das Gehalt mean?", "options": ["salary", "team", "application", "experience"], "answer": "salary"}, {"q": "How do you say I have three years of experience?", "options": ["Ich habe drei Jahre Erfahrung.", "Ich habe drei Jahre Qualifikation.", "Ich habe drei Jahre Bewerbung.", "Ich habe drei Jahre Gehalt."], "answer": "Ich habe drei Jahre Erfahrung."}, {"q": "What is das Vorstellungsgespräch?", "options": ["interview", "salary", "application", "qualification"], "answer": "interview"}, {"q": "Which word means qualification?", "options": ["die Qualifikation", "die Bewerbung", "die Erfahrung", "das Gehalt"], "answer": "die Qualifikation"}]}, {"id": "de-C1-01", "language": "German", "level": "C1", "title": "Polite Professional Communication", "intro": "At C1 level, the gap between technically correct German and naturally polished German becomes clear. Konjunktiv II forms are central to that polish.", "concept": "Konjunktiv II forms such as könnten, würde, and hätte soften requests without weakening the message. They are standard in emails, formal meetings, and any professional setting.", "vocabulary": [{"en": "could (polite)", "de": "könnten", "example": "Könnten Sie mir bitte helfen?"}, {"en": "would", "de": "würde", "example": "Ich würde das anders formulieren."}, {"en": "would have", "de": "hätte", "example": "Das hätte ich nicht erwartet."}, {"en": "regarding", "de": "bezüglich", "example": "Bezüglich Ihrer Anfrage hätte ich eine Frage."}, {"en": "urgent", "de": "dringend", "example": "Das Thema ist dringend."}, {"en": "to clarify", "de": "klären", "example": "Ich möchte das gern klären."}, {"en": "to propose", "de": "vorschlagen", "example": "Ich würde vorschlagen, das zu verschieben."}], "translations": [{"en": "Could you please help me?", "de": "Könnten Sie mir bitte helfen?"}, {"en": "I would phrase that differently.", "de": "Ich würde das anders formulieren."}, {"en": "Regarding your request, I have a question.", "de": "Bezüglich Ihrer Anfrage hätte ich eine Frage."}, {"en": "This matter is urgent.", "de": "Dieses Thema ist dringend."}, {"en": "I would suggest postponing that.", "de": "Ich würde vorschlagen, das zu verschieben."}], "practice": [{"type": "mcq", "q": "Which is the polite Konjunktiv II of können?", "options": ["könnten", "können", "konnte", "kann"], "answer": "könnten"}, {"type": "mcq", "q": "What does bezüglich mean?", "options": ["regarding", "urgent", "polite", "request"], "answer": "regarding"}, {"type": "fill", "q": "Ich ___ das anders formulieren. (würde)", "answer": "würde"}, {"type": "fill", "q": "Dieses Thema ist ___. (urgent)", "answer": "dringend"}, {"type": "match", "pairs": [["klären", "to clarify"], ["vorschlagen", "to propose"], ["dringend", "urgent"]]}], "quiz": [{"q": "What does könnten Sie express?", "options": ["A polite request", "A command", "A complaint", "A simple fact"], "answer": "A polite request"}, {"q": "Which word means urgent?", "options": ["dringend", "höflich", "bezüglich", "nötig"], "answer": "dringend"}, {"q": "Complete: Das ___ ich nicht erwartet.", "options": ["hätte", "habe", "hatte", "haben"], "answer": "hätte"}, {"q": "What does vorschlagen mean?", "options": ["to propose", "to clarify", "to confirm", "to postpone"], "answer": "to propose"}]}, {"id": "de-C1-02", "language": "German", "level": "C1", "title": "Complex Sentence Structures", "intro": "At C1, the measure of fluency is partly how comfortably you handle long, multi-clause sentences. This lesson focuses on structures that let you layer ideas without losing clarity.", "concept": "Relative clauses use a relative pronoun that matches the gender and case of the noun it refers to. Die Frau, die ich kenne means the woman who I know. Getting the pronoun right signals genuine grammatical control.", "vocabulary": [{"en": "relative pronoun", "de": "der/die/das (Relativpronomen)", "example": "Das Buch, das ich lese, ist interessant."}, {"en": "although", "de": "obwohl", "example": "Obwohl es regnet, gehe ich spazieren."}, {"en": "as long as", "de": "solange", "example": "Solange du hier bist, bin ich glücklich."}, {"en": "instead of", "de": "anstatt", "example": "Anstatt zu schlafen, arbeite ich."}, {"en": "complex", "de": "komplex", "example": "Der Satz ist grammatisch komplex."}, {"en": "to refer to", "de": "sich beziehen auf", "example": "Dieser Punkt bezieht sich auf das Thema."}, {"en": "nested", "de": "verschachtelt", "example": "Dieser Satz ist sehr verschachtelt."}], "translations": [{"en": "The book I am reading is interesting.", "de": "Das Buch, das ich lese, ist interessant."}, {"en": "Although it is raining, I go for a walk.", "de": "Obwohl es regnet, gehe ich spazieren."}, {"en": "As long as you are here, I am happy.", "de": "Solange du hier bist, bin ich glücklich."}, {"en": "Instead of sleeping, I am working.", "de": "Anstatt zu schlafen, arbeite ich."}, {"en": "This point refers to the topic.", "de": "Dieser Punkt bezieht sich auf das Thema."}], "practice": [{"type": "mcq", "q": "Choose the correct pronoun: Das Buch, ___ ich lese, ist interessant.", "options": ["das", "die", "der", "dem"], "answer": "das"}, {"type": "mcq", "q": "Which connector means although?", "options": ["obwohl", "solange", "anstatt", "weil"], "answer": "obwohl"}, {"type": "fill", "q": "___ es regnet, gehe ich spazieren. (although)", "answer": "Obwohl"}, {"type": "fill", "q": "Anstatt zu ___, arbeite ich. (schlafen)", "answer": "schlafen"}, {"type": "match", "pairs": [["obwohl", "although"], ["solange", "as long as"], ["anstatt", "instead of"]]}], "quiz": [{"q": "Which relative pronoun goes with Das Buch?", "options": ["das", "die", "der", "dem"], "answer": "das"}, {"q": "What does obwohl mean?", "options": ["although", "because", "as long as", "instead of"], "answer": "although"}, {"q": "Complete: Solange du hier bist, bin ich ___.", "options": ["glücklich", "komplex", "dringend", "höflich"], "answer": "glücklich"}, {"q": "What does anstatt mean?", "options": ["instead of", "as long as", "although", "regarding"], "answer": "instead of"}]}, {"id": "de-C1-03", "language": "German", "level": "C1", "title": "Academic and Analytical Writing", "intro": "Writing academic German requires a measured, precise, and impersonal register. This lesson introduces the phrases and structures that make analytical writing sound authoritative.", "concept": "German academic writing favors impersonal constructions like man kann sagen or es lässt sich feststellen rather than ich finde. Nominalizations, where a verb becomes a noun, add formality and are very common.", "vocabulary": [{"en": "one can say", "de": "man kann sagen", "example": "Man kann sagen, dass die Studie relevant ist."}, {"en": "it can be established", "de": "es lässt sich feststellen", "example": "Es lässt sich feststellen, dass die Daten eindeutig sind."}, {"en": "findings", "de": "die Ergebnisse", "example": "Die Ergebnisse der Studie sind klar."}, {"en": "in contrast", "de": "im Gegensatz dazu", "example": "Im Gegensatz dazu zeigt die zweite Gruppe andere Werte."}, {"en": "as a result", "de": "infolgedessen", "example": "Infolgedessen wurden neue Maßnahmen eingeführt."}, {"en": "objective", "de": "sachlich", "example": "Der Bericht ist sachlich und präzise."}, {"en": "to analyze", "de": "analysieren", "example": "Wir analysieren die Daten sorgfältig."}], "translations": [{"en": "One can say that the study is relevant.", "de": "Man kann sagen, dass die Studie relevant ist."}, {"en": "The findings of the study are clear.", "de": "Die Ergebnisse der Studie sind klar."}, {"en": "In contrast, the second group shows different values.", "de": "Im Gegensatz dazu zeigt die zweite Gruppe andere Werte."}, {"en": "As a result, new measures were introduced.", "de": "Infolgedessen wurden neue Maßnahmen eingeführt."}, {"en": "The report is objective and precise.", "de": "Der Bericht ist sachlich und präzise."}], "practice": [{"type": "mcq", "q": "Which phrase means one can say?", "options": ["man kann sagen", "es lässt sich feststellen", "im Gegensatz dazu", "infolgedessen"], "answer": "man kann sagen"}, {"type": "mcq", "q": "What does sachlich mean?", "options": ["objective", "complex", "urgent", "analytical"], "answer": "objective"}, {"type": "fill", "q": "Die ___ der Studie sind klar. (findings)", "answer": "Ergebnisse"}, {"type": "fill", "q": "Im ___ dazu zeigt die zweite Gruppe andere Werte.", "answer": "Gegensatz"}, {"type": "match", "pairs": [["analysieren", "to analyze"], ["sachlich", "objective"], ["infolgedessen", "as a result"]]}], "quiz": [{"q": "What does es lässt sich feststellen mean?", "options": ["it can be established", "one can say", "as a result", "in contrast"], "answer": "it can be established"}, {"q": "Which word means findings?", "options": ["die Ergebnisse", "die Maßnahmen", "die Studie", "die Analyse"], "answer": "die Ergebnisse"}, {"q": "Complete: Im Gegensatz ___ zeigt die zweite Gruppe andere Werte.", "options": ["dazu", "daran", "damit", "davon"], "answer": "dazu"}, {"q": "What does infolgedessen mean?", "options": ["as a result", "in contrast", "although", "as long as"], "answer": "as a result"}]}, {"id": "de-C2-01", "language": "German", "level": "C2", "title": "Idiomatic and Literary German", "intro": "True mastery means recognizing and using idioms naturally without pausing to decode them. This lesson works through expressions that native speakers reach for every day.", "concept": "German idioms work as fixed units of meaning. Den Nagel auf den Kopf treffen does not literally mean anything about nails or heads. Learn the expression as a whole and you start thinking in German.", "vocabulary": [{"en": "hit the nail on the head", "de": "den Nagel auf den Kopf treffen", "example": "Mit diesem Kommentar hast du den Nagel auf den Kopf getroffen."}, {"en": "fall through", "de": "ins Wasser fallen", "example": "Unser Plan ist leider ins Wasser gefallen."}, {"en": "get to the point", "de": "auf den Punkt bringen", "example": "Sie hat das Problem auf den Punkt gebracht."}, {"en": "read between the lines", "de": "zwischen den Zeilen lesen", "example": "Man muss hier zwischen den Zeilen lesen."}, {"en": "polished", "de": "geschliffen", "example": "Sein Stil ist geschliffen und präzise."}, {"en": "nuance", "de": "die Nuance", "example": "Jede Nuance zählt auf diesem Niveau."}, {"en": "nested", "de": "verschachtelt", "example": "Dieser Satz ist sehr verschachtelt."}], "translations": [{"en": "With that comment you hit the nail on the head.", "de": "Mit diesem Kommentar hast du den Nagel auf den Kopf getroffen."}, {"en": "Our plan unfortunately fell through.", "de": "Unser Plan ist leider ins Wasser gefallen."}, {"en": "She got straight to the point.", "de": "Sie hat das Problem auf den Punkt gebracht."}, {"en": "One has to read between the lines here.", "de": "Man muss hier zwischen den Zeilen lesen."}, {"en": "His style is polished and precise.", "de": "Sein Stil ist geschliffen und präzise."}], "practice": [{"type": "mcq", "q": "What does den Nagel auf den Kopf treffen mean?", "options": ["to be exactly right", "to fail", "to ask a question", "to apologize"], "answer": "to be exactly right"}, {"type": "mcq", "q": "Which idiom means a plan failed?", "options": ["ins Wasser fallen", "auf den Punkt bringen", "geschliffen sein", "die Nuance"], "answer": "ins Wasser fallen"}, {"type": "fill", "q": "Sie hat das Problem auf den ___ gebracht.", "answer": "Punkt"}, {"type": "fill", "q": "Der Satz ist sehr ___. (nested)", "answer": "verschachtelt"}, {"type": "match", "pairs": [["geschliffen", "polished"], ["die Nuance", "nuance"], ["verschachtelt", "nested"]]}], "quiz": [{"q": "What does auf den Punkt bringen mean?", "options": ["to get to the point", "to exaggerate", "to avoid a topic", "to translate"], "answer": "to get to the point"}, {"q": "Which word means nested or complex?", "options": ["verschachtelt", "geschliffen", "dringend", "höflich"], "answer": "verschachtelt"}, {"q": "What does ins Wasser fallen mean?", "options": ["a plan fails", "a person swims", "a project succeeds", "a rule changes"], "answer": "a plan fails"}, {"q": "What does die Nuance mean?", "options": ["nuance", "advantage", "request", "experience"], "answer": "nuance"}]}, {"id": "de-C2-02", "language": "German", "level": "C2", "title": "Rhetoric and Persuasion", "intro": "At C2 level you can argue, persuade, and engage an audience. This lesson covers the rhetorical tools that make German speech and writing not just correct but genuinely compelling.", "concept": "Effective rhetoric in German often uses tricolon, rhetorical questions, and strategic concession (zugegeben, dennoch). These devices signal a mature command of the language.", "vocabulary": [{"en": "admittedly", "de": "zugegeben", "example": "Zugegeben, das Argument hat Schwächen."}, {"en": "nevertheless", "de": "dennoch", "example": "Dennoch überwiegen die Vorteile."}, {"en": "it goes without saying", "de": "es versteht sich von selbst", "example": "Es versteht sich von selbst, dass Ehrlichkeit zählt."}, {"en": "to convince", "de": "überzeugen", "example": "Das Argument hat mich überzeugt."}, {"en": "compelling", "de": "überzeugend", "example": "Ihr Vortrag war sehr überzeugend."}, {"en": "concession", "de": "das Zugeständnis", "example": "Das war ein wichtiges Zugeständnis."}, {"en": "to provoke thought", "de": "zum Nachdenken anregen", "example": "Dieser Text regt zum Nachdenken an."}], "translations": [{"en": "Admittedly, the argument has weaknesses.", "de": "Zugegeben, das Argument hat Schwächen."}, {"en": "Nevertheless, the advantages outweigh them.", "de": "Dennoch überwiegen die Vorteile."}, {"en": "It goes without saying that honesty matters.", "de": "Es versteht sich von selbst, dass Ehrlichkeit zählt."}, {"en": "Her presentation was very compelling.", "de": "Ihr Vortrag war sehr überzeugend."}, {"en": "This text provokes thought.", "de": "Dieser Text regt zum Nachdenken an."}], "practice": [{"type": "mcq", "q": "Which word means admittedly?", "options": ["zugegeben", "dennoch", "überzeugend", "trotzdem"], "answer": "zugegeben"}, {"type": "mcq", "q": "What does dennoch mean?", "options": ["nevertheless", "admittedly", "compelling", "therefore"], "answer": "nevertheless"}, {"type": "fill", "q": "Ihr Vortrag war sehr ___. (compelling)", "answer": "überzeugend"}, {"type": "fill", "q": "Das Argument hat mich ___. (convince)", "answer": "überzeugt"}, {"type": "match", "pairs": [["überzeugen", "to convince"], ["das Zugeständnis", "concession"], ["zugegeben", "admittedly"]]}], "quiz": [{"q": "What does überzeugend mean?", "options": ["compelling", "admittedly", "nevertheless", "objective"], "answer": "compelling"}, {"q": "Which word means nevertheless?", "options": ["dennoch", "zugegeben", "außerdem", "obwohl"], "answer": "dennoch"}, {"q": "Complete: Zugegeben, das Argument hat ___.", "options": ["Schwächen", "Stärken", "Vorteile", "Nuancen"], "answer": "Schwächen"}, {"q": "What does zum Nachdenken anregen mean?", "options": ["to provoke thought", "to clarify", "to convince", "to concede"], "answer": "to provoke thought"}]}, {"id": "de-C2-03", "language": "German", "level": "C2", "title": "Philosophy and Abstract Thinking", "intro": "German has given the world some of the most influential philosophical vocabulary. At C2 level, handling abstract ideas precisely marks the final stage of linguistic mastery.", "concept": "German allows compound noun creation with almost no limit, which is key in philosophical and academic language. Weltanschauung and Zeitgeist each compress a whole idea into one term.", "vocabulary": [{"en": "world view", "de": "die Weltanschauung", "example": "Jeder Mensch hat eine eigene Weltanschauung."}, {"en": "spirit of the time", "de": "der Zeitgeist", "example": "Der Zeitgeist der 1960er war von Freiheit geprägt."}, {"en": "existence", "de": "die Existenz", "example": "Die Frage der menschlichen Existenz ist zentral."}, {"en": "consciousness", "de": "das Bewusstsein", "example": "Das Bewusstsein ist schwer zu definieren."}, {"en": "freedom", "de": "die Freiheit", "example": "Freiheit hat immer auch eine Grenze."}, {"en": "to question", "de": "hinterfragen", "example": "Wir müssen das hinterfragen."}, {"en": "contradiction", "de": "der Widerspruch", "example": "Das ist ein offensichtlicher Widerspruch."}], "translations": [{"en": "Every person has their own world view.", "de": "Jeder Mensch hat eine eigene Weltanschauung."}, {"en": "The spirit of the 1960s was shaped by freedom.", "de": "Der Zeitgeist der 1960er war von Freiheit geprägt."}, {"en": "The question of human existence is central.", "de": "Die Frage der menschlichen Existenz ist zentral."}, {"en": "We must question that.", "de": "Wir müssen das hinterfragen."}, {"en": "That is an obvious contradiction.", "de": "Das ist ein offensichtlicher Widerspruch."}], "practice": [{"type": "mcq", "q": "What does die Weltanschauung mean?", "options": ["world view", "spirit of the time", "consciousness", "existence"], "answer": "world view"}, {"type": "mcq", "q": "Which word means freedom?", "options": ["die Freiheit", "das Bewusstsein", "die Existenz", "der Widerspruch"], "answer": "die Freiheit"}, {"type": "fill", "q": "Das ist ein offensichtlicher ___. (contradiction)", "answer": "Widerspruch"}, {"type": "fill", "q": "Wir müssen das ___. (question)", "answer": "hinterfragen"}, {"type": "match", "pairs": [["der Zeitgeist", "spirit of the time"], ["das Bewusstsein", "consciousness"], ["die Existenz", "existence"]]}], "quiz": [{"q": "What is der Zeitgeist?", "options": ["spirit of the time", "world view", "contradiction", "existence"], "answer": "spirit of the time"}, {"q": "What does hinterfragen mean?", "options": ["to question", "to contradict", "to define", "to analyze"], "answer": "to question"}, {"q": "Which word means consciousness?", "options": ["das Bewusstsein", "die Freiheit", "die Existenz", "der Widerspruch"], "answer": "das Bewusstsein"}, {"q": "Complete: Das ist ein offensichtlicher ___.", "options": ["Widerspruch", "Zeitgeist", "Bewusstsein", "Freiheit"], "answer": "Widerspruch"}]}, {"id": "en-Beginner-01", "language": "English", "level": "Beginner", "title": "Everyday Greetings", "intro": "The first things most people learn in any language are the words to say hello and goodbye. In English, these come up every single day, in every kind of conversation.", "concept": "English greetings depend on the time of day and the situation. Hi and Hello work almost anywhere. Good morning, good afternoon, and good evening match specific times of day.", "vocabulary": [{"en": "hello", "de": "Hallo", "example": "Hello, my name is Sam."}, {"en": "good morning", "de": "Guten Morgen", "example": "Good morning, everyone."}, {"en": "good evening", "de": "Guten Abend", "example": "Good evening, welcome."}, {"en": "goodbye", "de": "Auf Wiedersehen", "example": "Goodbye, see you tomorrow."}, {"en": "how are you", "de": "Wie geht es dir", "example": "How are you today?"}, {"en": "nice to meet you", "de": "Schön, dich kennenzulernen", "example": "Nice to meet you, Anna."}, {"en": "please", "de": "Bitte", "example": "Can I have water, please?"}, {"en": "thank you", "de": "Danke", "example": "Thank you for your help."}], "translations": [{"en": "Hello, how are you?", "de": "Hallo, wie geht es dir?"}, {"en": "Nice to meet you.", "de": "Schön, dich kennenzulernen."}, {"en": "My name is Sam.", "de": "Ich heiße Sam."}, {"en": "Thank you very much.", "de": "Vielen Dank."}, {"en": "See you tomorrow.", "de": "Bis morgen."}], "practice": [{"type": "mcq", "q": "Which greeting fits the morning?", "options": ["Good morning", "Good night", "Goodbye", "Please"], "answer": "Good morning"}, {"type": "mcq", "q": "Choose the polite word to use in a request.", "options": ["please", "goodbye", "hello", "sorry"], "answer": "please"}, {"type": "fill", "q": "Nice to ___ you.", "answer": "meet"}, {"type": "fill", "q": "How ___ you today?", "answer": "are"}, {"type": "match", "pairs": [["hello", "Hallo"], ["goodbye", "Auf Wiedersehen"], ["please", "Bitte"]]}], "quiz": [{"q": "What does nice to meet you express?", "options": ["A first introduction", "A farewell", "An apology", "A request"], "answer": "A first introduction"}, {"q": "Complete: Good ___, everyone.", "options": ["morning", "please", "sorry", "thanks"], "answer": "morning"}, {"q": "Which word means Danke in English?", "options": ["Thank you", "Please", "Sorry", "Hello"], "answer": "Thank you"}, {"q": "Which greeting suits the evening?", "options": ["Good evening", "Good morning", "Good afternoon", "Goodbye"], "answer": "Good evening"}]}, {"id": "en-Beginner-02", "language": "English", "level": "Beginner", "title": "Colours and Simple Descriptions", "intro": "Being able to describe what you see is a key step in any language. This lesson gives you the words for everyday colours and simple adjectives.", "concept": "In English, adjectives come before the noun they describe: a red apple, a big box. The adjective does not change its form regardless of the noun, which makes English descriptions simpler than in many other languages.", "vocabulary": [{"en": "red", "de": "rot", "example": "I have a red pen."}, {"en": "blue", "de": "blau", "example": "The sky is blue."}, {"en": "round", "de": "rund", "example": "The ball is round."}, {"en": "square", "de": "quadratisch", "example": "This is a square box."}, {"en": "big", "de": "groß", "example": "That is a big house."}, {"en": "small", "de": "klein", "example": "She has a small bag."}, {"en": "colour", "de": "die Farbe", "example": "What colour is that?"}], "translations": [{"en": "I have a red pen.", "de": "Ich habe einen roten Stift."}, {"en": "The sky is blue.", "de": "Der Himmel ist blau."}, {"en": "That is a big house.", "de": "Das ist ein großes Haus."}, {"en": "She has a small bag.", "de": "Sie hat eine kleine Tasche."}, {"en": "What colour is that?", "de": "Welche Farbe ist das?"}], "practice": [{"type": "mcq", "q": "Where does the adjective go in English?", "options": ["before the noun", "after the noun", "at the end", "at the start"], "answer": "before the noun"}, {"type": "mcq", "q": "Complete: The sky is ___.", "options": ["blue", "red", "round", "small"], "answer": "blue"}, {"type": "fill", "q": "That is a ___ house. (big)", "answer": "big"}, {"type": "fill", "q": "What ___ is that? (colour)", "answer": "colour"}, {"type": "match", "pairs": [["red", "rot"], ["small", "klein"], ["round", "rund"]]}], "quiz": [{"q": "What does big mean in German?", "options": ["groß", "klein", "rund", "blau"], "answer": "groß"}, {"q": "Where does the adjective go in a red apple?", "options": ["before the noun", "after the noun", "after the verb", "it depends"], "answer": "before the noun"}, {"q": "Which word means die Farbe?", "options": ["colour", "shape", "size", "number"], "answer": "colour"}, {"q": "Complete: The ball is ___.", "options": ["round", "square", "big", "red"], "answer": "round"}]}, {"id": "en-Beginner-03", "language": "English", "level": "Beginner", "title": "Days, Months, and Time", "intro": "Knowing the days of the week, the months, and how to tell the time gives you the building blocks of every schedule, appointment, and conversation about plans.", "concept": "In English, days of the week and months are always capitalized. Telling the time uses it is followed by the time: it is three o'clock, it is half past two, it is quarter to five.", "vocabulary": [{"en": "Monday", "de": "Montag", "example": "The meeting is on Monday."}, {"en": "Friday", "de": "Freitag", "example": "We finish early on Friday."}, {"en": "January", "de": "Januar", "example": "My birthday is in January."}, {"en": "o'clock", "de": "Uhr", "example": "It is three o'clock."}, {"en": "half past", "de": "halb", "example": "It is half past two."}, {"en": "quarter to", "de": "Viertel vor", "example": "It is quarter to five."}, {"en": "tomorrow", "de": "morgen", "example": "I will see you tomorrow."}], "translations": [{"en": "The meeting is on Monday.", "de": "Das Treffen ist am Montag."}, {"en": "My birthday is in January.", "de": "Mein Geburtstag ist im Januar."}, {"en": "It is three o'clock.", "de": "Es ist drei Uhr."}, {"en": "It is half past two.", "de": "Es ist halb drei."}, {"en": "I will see you tomorrow.", "de": "Ich sehe dich morgen."}], "practice": [{"type": "mcq", "q": "How is Monday spelled in English?", "options": ["Monday", "monday", "MONDAY", "Monnday"], "answer": "Monday"}, {"type": "mcq", "q": "Complete: It is ___ past two.", "options": ["half", "quarter", "three", "o'clock"], "answer": "half"}, {"type": "fill", "q": "I will see you ___. (tomorrow)", "answer": "tomorrow"}, {"type": "fill", "q": "It is quarter ___ five. (to)", "answer": "to"}, {"type": "match", "pairs": [["Montag", "Monday"], ["Freitag", "Friday"], ["morgen", "tomorrow"]]}], "quiz": [{"q": "Are days of the week capitalized in English?", "options": ["Yes, always", "No, never", "Only formally", "Only at sentence start"], "answer": "Yes, always"}, {"q": "How do you say drei Uhr in English?", "options": ["three o'clock", "half past three", "quarter to three", "three thirty"], "answer": "three o'clock"}, {"q": "What does tomorrow mean in German?", "options": ["morgen", "heute", "gestern", "jetzt"], "answer": "morgen"}, {"q": "Complete: My birthday is ___ January.", "options": ["in", "on", "at", "by"], "answer": "in"}]}, {"id": "en-Elementary-01", "language": "English", "level": "Elementary", "title": "Family and Daily Life", "intro": "Talking about the people closest to you is one of the first things anyone wants to do in a new language. This lesson builds the vocabulary for everyday conversations about family and routine.", "concept": "The present simple is used for routines and general facts. With he, she, or it as the subject, the verb gets an extra s or es at the end: works, studies, watches.", "vocabulary": [{"en": "family", "de": "die Familie", "example": "My family is big."}, {"en": "brother", "de": "der Bruder", "example": "My brother works in Berlin."}, {"en": "sister", "de": "die Schwester", "example": "Her sister studies English."}, {"en": "every day", "de": "jeden Tag", "example": "I cook every day."}, {"en": "usually", "de": "normalerweise", "example": "We usually eat at seven."}, {"en": "busy", "de": "beschäftigt", "example": "He is busy today."}, {"en": "free time", "de": "die Freizeit", "example": "What do you do in your free time?"}], "translations": [{"en": "My family is big.", "de": "Meine Familie ist groß."}, {"en": "My brother works in Berlin.", "de": "Mein Bruder arbeitet in Berlin."}, {"en": "We usually eat at seven.", "de": "Wir essen normalerweise um sieben."}, {"en": "She is busy today.", "de": "Sie ist heute beschäftigt."}, {"en": "What do you do in your free time?", "de": "Was machst du in deiner Freizeit?"}], "practice": [{"type": "mcq", "q": "Choose the correct possessive: ___ brother lives in Bonn.", "options": ["My", "I", "Me", "Mine"], "answer": "My"}, {"type": "mcq", "q": "What does every day mean in German?", "options": ["jeden Tag", "normalerweise", "die Freizeit", "beschäftigt"], "answer": "jeden Tag"}, {"type": "fill", "q": "She ___ every day. (work)", "answer": "works"}, {"type": "fill", "q": "We ___ eat at seven. (usually)", "answer": "usually"}, {"type": "match", "pairs": [["family", "die Familie"], ["brother", "der Bruder"], ["free time", "die Freizeit"]]}], "quiz": [{"q": "Complete: He ___ busy today.", "options": ["is", "am", "are", "be"], "answer": "is"}, {"q": "What does die Freizeit mean?", "options": ["free time", "busy", "family", "sister"], "answer": "free time"}, {"q": "Choose the correct sentence.", "options": ["My sister studies English.", "My sister study English.", "My sister studying English.", "Sister my studies English."], "answer": "My sister studies English."}, {"q": "What does der Bruder mean?", "options": ["brother", "sister", "family", "friend"], "answer": "brother"}]}, {"id": "en-Elementary-02", "language": "English", "level": "Elementary", "title": "Shopping and Money", "intro": "Knowing how to ask prices, express preferences, and complete a transaction gives you real independence in everyday situations.", "concept": "To ask the price of something, use How much is this? or How much does it cost? To say you want something, use I would like. It is politer than I want.", "vocabulary": [{"en": "how much", "de": "wie viel", "example": "How much is this coat?"}, {"en": "too expensive", "de": "zu teuer", "example": "That is too expensive for me."}, {"en": "cheap", "de": "günstig", "example": "The market is cheap on Saturdays."}, {"en": "I would like", "de": "Ich hätte gern", "example": "I would like the blue one, please."}, {"en": "receipt", "de": "die Quittung", "example": "Can I have a receipt?"}, {"en": "change", "de": "das Wechselgeld", "example": "Here is your change."}, {"en": "sale", "de": "der Ausverkauf", "example": "Everything is on sale today."}], "translations": [{"en": "How much is this coat?", "de": "Wie viel kostet dieser Mantel?"}, {"en": "That is too expensive for me.", "de": "Das ist zu teuer für mich."}, {"en": "I would like the blue one.", "de": "Ich hätte gern d
