as blaue."}, {"en": "Can I have a receipt?", "de": "Kann ich eine Quittung haben?"}, {"en": "Everything is on sale today.", "de": "Heute ist alles im Ausverkauf."}], "practice": [{"type": "mcq", "q": "Which phrase asks for the price?", "options": ["How much is this?", "Where is this?", "What is this?", "When is this?"], "answer": "How much is this?"}, {"type": "mcq", "q": "Which is more polite?", "options": ["I would like", "I want", "Give me", "I need"], "answer": "I would like"}, {"type": "fill", "q": "That is too ___ for me. (expensive)", "answer": "expensive"}, {"type": "fill", "q": "Can I have a ___? (receipt)", "answer": "receipt"}, {"type": "match", "pairs": [["cheap", "günstig"], ["change", "das Wechselgeld"], ["sale", "der Ausverkauf"]]}], "quiz": [{"q": "How do you ask for the price politely?", "options": ["How much is this?", "Give me the price.", "What costs?", "Price?"], "answer": "How much is this?"}, {"q": "What does günstig mean?", "options": ["cheap", "expensive", "sale", "receipt"], "answer": "cheap"}, {"q": "Complete: I would ___ the blue one.", "options": ["like", "want", "need", "take"], "answer": "like"}, {"q": "What is das Wechselgeld?", "options": ["change", "receipt", "sale", "price"], "answer": "change"}]}, {"id": "en-Elementary-03", "language": "English", "level": "Elementary", "title": "Weather and Seasons", "intro": "Talking about the weather is one of the most natural ways to start a conversation in English. This lesson gives you the vocabulary for weather and seasons.", "concept": "English uses it is for weather descriptions: it is raining, it is sunny, it is cold. The present continuous describes right now; the present simple describes a general pattern.", "vocabulary": [{"en": "sunny", "de": "sonnig", "example": "It is sunny today."}, {"en": "rainy", "de": "regnerisch", "example": "It is rainy in autumn."}, {"en": "cold", "de": "kalt", "example": "It is very cold in winter."}, {"en": "hot", "de": "heiß", "example": "It is hot in summer."}, {"en": "season", "de": "die Jahreszeit", "example": "My favourite season is spring."}, {"en": "forecast", "de": "die Wettervorhersage", "example": "The forecast says rain tomorrow."}, {"en": "temperature", "de": "die Temperatur", "example": "The temperature is 20 degrees."}], "translations": [{"en": "It is sunny today.", "de": "Es ist heute sonnig."}, {"en": "It is very cold in winter.", "de": "Im Winter ist es sehr kalt."}, {"en": "My favourite season is spring.", "de": "Meine Lieblingszeit ist der Frühling."}, {"en": "The forecast says rain tomorrow.", "de": "Die Wettervorhersage sagt morgen Regen."}, {"en": "The temperature is 20 degrees.", "de": "Die Temperatur beträgt 20 Grad."}], "practice": [{"type": "mcq", "q": "Which tense describes current weather?", "options": ["present continuous", "past simple", "present simple", "future"], "answer": "present continuous"}, {"type": "mcq", "q": "Complete: It ___ raining.", "options": ["is", "are", "am", "be"], "answer": "is"}, {"type": "fill", "q": "My favourite ___ is spring. (season)", "answer": "season"}, {"type": "fill", "q": "The ___ says rain tomorrow. (forecast)", "answer": "forecast"}, {"type": "match", "pairs": [["sunny", "sonnig"], ["cold", "kalt"], ["hot", "heiß"]]}], "quiz": [{"q": "What does sonnig mean?", "options": ["sunny", "rainy", "cold", "hot"], "answer": "sunny"}, {"q": "Choose the correct sentence for current weather.", "options": ["It is raining.", "It rains now.", "It rained.", "It has rain."], "answer": "It is raining."}, {"q": "What is die Wettervorhersage?", "options": ["forecast", "temperature", "season", "summer"], "answer": "forecast"}, {"q": "Complete: The temperature ___ 20 degrees.", "options": ["is", "are", "am", "be"], "answer": "is"}]}, {"id": "en-Intermediate-01", "language": "English", "level": "Intermediate", "title": "Sharing Past Experiences", "intro": "Telling stories about your life in English means choosing between two past tenses. This lesson shows you the difference clearly.", "concept": "The past simple describes a finished action at a specific time: I visited Berlin last year. The present perfect describes an experience without a specific time: I have been to Germany twice. Words like last year pull toward past simple; ever, already, and never pull toward present perfect.", "vocabulary": [{"en": "I have been", "de": "ich war (Perfekt)", "example": "I have been to Germany twice."}, {"en": "I visited", "de": "ich besuchte", "example": "I visited Berlin last year."}, {"en": "already", "de": "schon", "example": "I have already finished the book."}, {"en": "ever", "de": "jemals", "example": "Have you ever traveled alone?"}, {"en": "recently", "de": "vor Kurzem", "example": "She recently changed jobs."}, {"en": "never", "de": "noch nie", "example": "I have never tried sushi."}, {"en": "experience", "de": "die Erfahrung", "example": "It was an unforgettable experience."}], "translations": [{"en": "I have been to Germany twice.", "de": "Ich war schon zweimal in Deutschland."}, {"en": "I visited Berlin last year.", "de": "Ich habe letztes Jahr Berlin besucht."}, {"en": "Have you ever traveled alone?", "de": "Bist du jemals allein gereist?"}, {"en": "She recently changed jobs.", "de": "Sie hat vor Kurzem den Job gewechselt."}, {"en": "It was an unforgettable experience.", "de": "Es war eine unvergessliche Erfahrung."}], "practice": [{"type": "mcq", "q": "Complete: I ___ to Germany twice.", "options": ["have been", "was", "am", "go"], "answer": "have been"}, {"type": "mcq", "q": "Which word signals past simple?", "options": ["last year", "ever", "already", "never"], "answer": "last year"}, {"type": "fill", "q": "I ___ Berlin last year. (visit, past simple)", "answer": "visited"}, {"type": "fill", "q": "Have you ___ traveled alone?", "answer": "ever"}, {"type": "match", "pairs": [["recently", "vor Kurzem"], ["already", "schon"], ["never", "noch nie"]]}], "quiz": [{"q": "Which sentence uses the past simple correctly?", "options": ["I visited Berlin last year.", "I have visited Berlin last year.", "I have been visiting last year.", "I visit Berlin last year."], "answer": "I visited Berlin last year."}, {"q": "Which tense uses have or has plus a past participle?", "options": ["present perfect", "past simple", "future simple", "present continuous"], "answer": "present perfect"}, {"q": "What does vor Kurzem mean?", "options": ["recently", "last year", "never", "always"], "answer": "recently"}, {"q": "Complete: She has ___ finished the report.", "options": ["already", "ever", "yet", "never"], "answer": "already"}]}, {"id": "en-Intermediate-02", "language": "English", "level": "Intermediate", "title": "Giving Advice and Suggestions", "intro": "Knowing how to suggest and advise in English makes you a much more active participant in conversations. This lesson covers the most natural structures.", "concept": "Should is the most common way to give advice. If I were you is a polite way to introduce a stronger suggestion. Why not and have you considered are softer and more indirect.", "vocabulary": [{"en": "you should", "de": "du solltest", "example": "You should get more sleep."}, {"en": "if I were you", "de": "an deiner Stelle", "example": "If I were you, I would apologize."}, {"en": "have you considered", "de": "hast du überlegt", "example": "Have you considered changing jobs?"}, {"en": "why not", "de": "warum nicht", "example": "Why not take a break?"}, {"en": "advice", "de": "der Rat", "example": "That is good advice."}, {"en": "to recommend", "de": "empfehlen", "example": "I recommend seeing a doctor."}, {"en": "it might help", "de": "es könnte helfen", "example": "It might help to write it down."}], "translations": [{"en": "You should get more sleep.", "de": "Du solltest mehr schlafen."}, {"en": "If I were you, I would apologize.", "de": "An deiner Stelle würde ich mich entschuldigen."}, {"en": "Have you considered changing jobs?", "de": "Hast du überlegt, den Job zu wechseln?"}, {"en": "Why not take a break?", "de": "Warum nicht eine Pause machen?"}, {"en": "I recommend seeing a doctor.", "de": "Ich empfehle, zum Arzt zu gehen."}], "practice": [{"type": "mcq", "q": "Which is the most direct way to give advice?", "options": ["you should", "why not", "have you considered", "it might help"], "answer": "you should"}, {"type": "mcq", "q": "What does if I were you introduce?", "options": ["A polite suggestion", "A fact", "An order", "A question"], "answer": "A polite suggestion"}, {"type": "fill", "q": "You ___ get more sleep. (should)", "answer": "should"}, {"type": "fill", "q": "I ___ seeing a doctor. (recommend)", "answer": "recommend"}, {"type": "match", "pairs": [["advice", "der Rat"], ["why not", "warum nicht"], ["it might help", "es könnte helfen"]]}], "quiz": [{"q": "Which phrase gives advice without being blunt?", "options": ["if I were you", "you should", "you must", "do it"], "answer": "if I were you"}, {"q": "What does der Rat mean?", "options": ["advice", "recommendation", "question", "suggestion"], "answer": "advice"}, {"q": "Complete: Have you ___ taking a break?", "options": ["considered", "thinking", "suggest", "advised"], "answer": "considered"}, {"q": "Which phrase is the softest suggestion?", "options": ["why not", "you should", "if I were you", "you must"], "answer": "why not"}]}, {"id": "en-Intermediate-03", "language": "English", "level": "Intermediate", "title": "Health and the Body", "intro": "Being able to describe how you feel and what is wrong is essential, especially when you need to see a doctor or explain an absence.", "concept": "To describe a health problem, say I have a headache or I have a sore throat. Sore means painful and comes before the body part. For ongoing problems, use I have been feeling to show the continuing nature.", "vocabulary": [{"en": "headache", "de": "Kopfschmerzen", "example": "I have a headache."}, {"en": "sore throat", "de": "Halsschmerzen", "example": "I have a sore throat."}, {"en": "temperature", "de": "Fieber", "example": "She has a temperature."}, {"en": "to feel dizzy", "de": "sich schwindelig fühlen", "example": "I feel dizzy."}, {"en": "prescription", "de": "das Rezept", "example": "The doctor gave me a prescription."}, {"en": "to recover", "de": "sich erholen", "example": "He is recovering well."}, {"en": "appointment", "de": "der Termin", "example": "I have a doctor's appointment."}], "translations": [{"en": "I have a headache.", "de": "Ich habe Kopfschmerzen."}, {"en": "She has a temperature.", "de": "Sie hat Fieber."}, {"en": "I feel dizzy.", "de": "Ich fühle mich schwindelig."}, {"en": "The doctor gave me a prescription.", "de": "Der Arzt hat mir ein Rezept gegeben."}, {"en": "I have a doctor's appointment.", "de": "Ich habe einen Arzttermin."}], "practice": [{"type": "mcq", "q": "How do you say Kopfschmerzen in English?", "options": ["headache", "sore throat", "temperature", "dizziness"], "answer": "headache"}, {"type": "mcq", "q": "What does sore mean?", "options": ["painful", "swollen", "blocked", "tender"], "answer": "painful"}, {"type": "fill", "q": "I have a ___ throat. (sore)", "answer": "sore"}, {"type": "fill", "q": "She has a ___. (temperature)", "answer": "temperature"}, {"type": "match", "pairs": [["headache", "Kopfschmerzen"], ["prescription", "das Rezept"], ["appointment", "der Termin"]]}], "quiz": [{"q": "Which sentence correctly describes an ongoing problem?", "options": ["I have been feeling dizzy.", "I feel dizzy yesterday.", "I am feel dizzy.", "I feeled dizzy."], "answer": "I have been feeling dizzy."}, {"q": "What does das Rezept mean?", "options": ["prescription", "appointment", "temperature", "recovery"], "answer": "prescription"}, {"q": "Complete: The doctor gave me a ___.", "options": ["prescription", "temperature", "headache", "appointment"], "answer": "prescription"}, {"q": "What does to recover mean?", "options": ["to get better", "to get worse", "to feel dizzy", "to take medicine"], "answer": "to get better"}]}, {"id": "en-Upper-Intermediate-01", "language": "English", "level": "Upper-Intermediate", "title": "Talking About the Future", "intro": "English has several ways to talk about the future, each one carrying a slightly different meaning. Choosing the right one shows real fluency.", "concept": "Will suits predictions and spontaneous decisions. Going to suits intentions formed earlier. The present continuous, such as I am meeting her, describes a fixed arrangement with another person.", "vocabulary": [{"en": "I will", "de": "ich werde", "example": "I will call you tomorrow."}, {"en": "I am going to", "de": "ich habe vor", "example": "I am going to study abroad."}, {"en": "I am meeting", "de": "ich treffe mich", "example": "I am meeting her on Friday."}, {"en": "prediction", "de": "die Vorhersage", "example": "That is just a prediction."}, {"en": "intention", "de": "die Absicht", "example": "My intention is to finish by Friday."}, {"en": "likely", "de": "wahrscheinlich", "example": "It will likely rain tomorrow."}, {"en": "arrangement", "de": "die Vereinbarung", "example": "We have an arrangement for Monday."}], "translations": [{"en": "I will call you tomorrow.", "de": "Ich werde dich morgen anrufen."}, {"en": "I am going to study abroad.", "de": "Ich habe vor, im Ausland zu studieren."}, {"en": "I am meeting her on Friday.", "de": "Ich treffe sie am Freitag."}, {"en": "It will likely rain tomorrow.", "de": "Es wird wahrscheinlich morgen regnen."}, {"en": "My intention is to finish by Friday.", "de": "Meine Absicht ist es, bis Freitag fertig zu sein."}], "practice": [{"type": "mcq", "q": "Choose the form for a fixed arrangement: I ___ her on Friday.", "options": ["am meeting", "will meet", "am going to meet", "meet"], "answer": "am meeting"}, {"type": "mcq", "q": "Which form expresses an earlier intention?", "options": ["am going to", "will", "present simple", "would"], "answer": "am going to"}, {"type": "fill", "q": "It ___ likely rain tomorrow.", "answer": "will"}, {"type": "fill", "q": "My ___ is to finish by Friday. (intention)", "answer": "intention"}, {"type": "match", "pairs": [["prediction", "die Vorhersage"], ["arrangement", "die Vereinbarung"], ["likely", "wahrscheinlich"]]}], "quiz": [{"q": "Which structure best suits a spontaneous decision?", "options": ["will", "am going to", "am meeting", "present simple"], "answer": "will"}, {"q": "Choose the sentence describing a fixed plan.", "options": ["I am meeting her on Friday.", "I will meet her.", "I meet her.", "I am going to meet her."], "answer": "I am meeting her on Friday."}, {"q": "What does die Vorhersage mean?", "options": ["prediction", "arrangement", "intention", "plan"], "answer": "prediction"}, {"q": "Complete: I ___ to study abroad next year.", "options": ["am going", "will going", "am go", "going"], "answer": "am going"}]}, {"id": "en-Upper-Intermediate-02", "language": "English", "level": "Upper-Intermediate", "title": "Reported Speech", "intro": "Reported speech is how you tell someone what another person said without quoting them directly. It comes up constantly in everyday English.", "concept": "When moving from direct to reported speech, verb tenses generally shift one step back: is becomes was, will becomes would, can becomes could.", "vocabulary": [{"en": "she said that", "de": "sie sagte, dass", "example": "She said that she was tired."}, {"en": "he told me", "de": "er sagte mir", "example": "He told me he would call later."}, {"en": "to claim", "de": "behaupten", "example": "She claimed she had finished."}, {"en": "apparently", "de": "anscheinend", "example": "Apparently, he is leaving."}, {"en": "according to", "de": "laut", "example": "According to her, it was fine."}, {"en": "to deny", "de": "leugnen", "example": "He denied saying that."}, {"en": "to confirm", "de": "bestätigen", "example": "She confirmed the meeting time."}], "translations": [{"en": "She said that she was tired.", "de": "Sie sagte, dass sie müde sei."}, {"en": "He told me he would call later.", "de": "Er sagte mir, er würde später anrufen."}, {"en": "Apparently, he is leaving.", "de": "Anscheinend geht er."}, {"en": "According to her, it was fine.", "de": "Laut ihr war es in Ordnung."}, {"en": "She confirmed the meeting time.", "de": "Sie bestätigte die Besprechungszeit."}], "practice": [{"type": "mcq", "q": "What happens to will in reported speech?", "options": ["it becomes would", "it stays will", "it becomes should", "it disappears"], "answer": "it becomes would"}, {"type": "mcq", "q": "What does is shift to in reported speech?", "options": ["was", "were", "had been", "has been"], "answer": "was"}, {"type": "fill", "q": "She said that she ___ tired. (was)", "answer": "was"}, {"type": "fill", "q": "He ___ me he would call. (told)", "answer": "told"}, {"type": "match", "pairs": [["apparently", "anscheinend"], ["to deny", "leugnen"], ["to confirm", "bestätigen"]]}], "quiz": [{"q": "What does will become in reported speech?", "options": ["would", "should", "could", "may"], "answer": "would"}, {"q": "Correct reported speech for He said I am hungry.", "options": ["He said he was hungry.", "He said he is hungry.", "He said he has been hungry.", "He said I was hungry."], "answer": "He said he was hungry."}, {"q": "What does laut mean?", "options": ["according to", "apparently", "although", "since"], "answer": "according to"}, {"q": "Which word means to deny?", "options": ["leugnen", "bestätigen", "behaupten", "anscheinend"], "answer": "leugnen"}]}, {"id": "en-Upper-Intermediate-03", "language": "English", "level": "Upper-Intermediate", "title": "Formal and Informal Register", "intro": "Knowing when to be formal and when to be relaxed is one of the subtler skills in English. Using the wrong register creates a strange impression even when your grammar is perfect.", "concept": "Formal English uses full forms, polite distancing phrases, and avoids contractions and phrasal verbs. Informal English uses contractions, colloquial vocabulary, and shorter sentences.", "vocabulary": [{"en": "I was wondering if", "de": "ich wollte fragen, ob", "example": "I was wondering if you could help."}, {"en": "could you possibly", "de": "könnten Sie eventuell", "example": "Could you possibly send that file?"}, {"en": "cheers", "de": "danke (umgangssprachlich)", "example": "Cheers for your help."}, {"en": "to drop a line", "de": "jemandem kurz schreiben", "example": "I'll drop you a line later."}, {"en": "to get back to", "de": "sich zurückmelden", "example": "I'll get back to you soon."}, {"en": "with regard to", "de": "bezüglich", "example": "With regard to your request, I can confirm."}, {"en": "to look into", "de": "sich damit befassen", "example": "I will look into that for you."}], "translations": [{"en": "I was wondering if you could help.", "de": "Ich wollte fragen, ob Sie helfen könnten."}, {"en": "Could you possibly send that file?", "de": "Könnten Sie eventuell diese Datei schicken?"}, {"en": "I'll get back to you soon.", "de": "Ich melde mich bald bei Ihnen."}, {"en": "With regard to your request, I can confirm.", "de": "Bezüglich Ihrer Anfrage kann ich bestätigen."}, {"en": "I will look into that for you.", "de": "Ich werde mich darum kümmern."}], "practice": [{"type": "mcq", "q": "Which phrase is formal?", "options": ["I was wondering if", "drop me a line", "cheers", "get back to me"], "answer": "I was wondering if"}, {"type": "mcq", "q": "What does cheers mean informally?", "options": ["thank you", "goodbye", "sorry", "please"], "answer": "thank you"}, {"type": "fill", "q": "With ___ to your request, I can confirm.", "answer": "regard"}, {"type": "fill", "q": "I'll get ___ to you soon.", "answer": "back"}, {"type": "match", "pairs": [["to look into", "sich damit befassen"], ["to drop a line", "kurz schreiben"], ["with regard to", "bezüglich"]]}], "quiz": [{"q": "Which sentence uses formal register?", "options": ["I was wondering if you could assist.", "Hey, can you help?", "Cheers for that.", "I'll drop you a line."], "answer": "I was wondering if you could assist."}, {"q": "What does to look into mean?", "options": ["to investigate or handle", "to read carefully", "to look up", "to see"], "answer": "to investigate or handle"}, {"q": "What does bezüglich mean?", "options": ["with regard to", "cheers", "get back to", "drop a line"], "answer": "with regard to"}, {"q": "Which phrase is informal?", "options": ["drop me a line", "I was wondering if", "with regard to", "could you possibly"], "answer": "drop me a line"}]}, {"id": "en-Advanced-01", "language": "English", "level": "Advanced", "title": "Expressing Opinions with Precision", "intro": "At an advanced level, strong opinions need more than just I think. This lesson introduces hedging language that lets you sound thoughtful and credible.", "concept": "Hedging words like arguably, tend to, and seem to soften a claim without weakening the argument. They show that you have considered other possibilities before stating your view.", "vocabulary": [{"en": "arguably", "de": "wohl, man könnte sagen", "example": "This is arguably the best option."}, {"en": "tend to", "de": "tendieren zu", "example": "People tend to overestimate their abilities."}, {"en": "seem to", "de": "scheinen zu", "example": "This policy seems to work well."}, {"en": "on balance", "de": "insgesamt", "example": "On balance, the plan is sound."}, {"en": "somewhat", "de": "etwas", "example": "The results are somewhat surprising."}, {"en": "reservation", "de": "der Vorbehalt", "example": "I have a reservation about this plan."}, {"en": "nuance", "de": "die Nuance", "example": "Every argument has nuances worth noting."}], "translations": [{"en": "This is arguably the best option.", "de": "Das ist wohl die beste Option."}, {"en": "People tend to overestimate their abilities.", "de": "Menschen tendieren dazu, ihre Fähigkeiten zu überschätzen."}, {"en": "This policy seems to work well.", "de": "Diese Politik scheint gut zu funktionieren."}, {"en": "On balance, the plan is sound.", "de": "Insgesamt ist der Plan solide."}, {"en": "I have a reservation about this plan.", "de": "Ich habe einen Vorbehalt gegenüber diesem Plan."}], "practice": [{"type": "mcq", "q": "Which word softens a claim carefully?", "options": ["arguably", "definitely", "obviously", "certainly"], "answer": "arguably"}, {"type": "mcq", "q": "Which phrase describes a general pattern?", "options": ["tend to", "seem to", "on balance", "somewhat"], "answer": "tend to"}, {"type": "fill", "q": "This policy ___ to work well. (seem)", "answer": "seems"}, {"type": "fill", "q": "I have a ___ about this plan. (reservation)", "answer": "reservation"}, {"type": "match", "pairs": [["on balance", "insgesamt"], ["somewhat", "etwas"], ["nuance", "die Nuance"]]}], "quiz": [{"q": "What function does arguably serve?", "options": ["It softens a strong claim", "It makes a claim stronger", "It changes the topic", "It asks a question"], "answer": "It softens a strong claim"}, {"q": "Which word means insgesamt?", "options": ["on balance", "somewhat", "arguably", "tend to"], "answer": "on balance"}, {"q": "Complete: People ___ to overestimate their abilities.", "options": ["tend", "tends", "tending", "tended"], "answer": "tend"}, {"q": "What does der Vorbehalt mean?", "options": ["reservation", "nuance", "balance", "opinion"], "answer": "reservation"}]}, {"id": "en-Advanced-02", "language": "English", "level": "Advanced", "title": "Conditional Structures", "intro": "Advanced conditional sentences let you explore hypothetical situations, counterfactuals, and mixed time frames with precision.", "concept": "The second conditional describes an unreal present: if I had more time, I would travel more. The third conditional describes an unreal past: if I had studied, I would have passed. A mixed conditional combines both.", "vocabulary": [{"en": "would have", "de": "hätte", "example": "I would have helped if I had known."}, {"en": "if I had", "de": "wenn ich gehabt hätte", "example": "If I had more time, I would read more."}, {"en": "hypothetical", "de": "hypothetisch", "example": "That is a hypothetical question."}, {"en": "regret", "de": "das Bedauern", "example": "She expressed regret for the decision."}, {"en": "consequence", "de": "die Konsequenz", "example": "The consequence of that choice was clear."}, {"en": "outcome", "de": "das Ergebnis", "example": "A different outcome was possible."}, {"en": "to wish", "de": "wünschen", "example": "I wish I had more time."}], "translations": [{"en": "If I had more time, I would read more.", "de": "Wenn ich mehr Zeit hätte, würde ich mehr lesen."}, {"en": "I would have helped if I had known.", "de": "Ich hätte geholfen, wenn ich es gewusst hätte."}, {"en": "A different outcome was possible.", "de": "Ein anderes Ergebnis wäre möglich gewesen."}, {"en": "I wish I had more time.", "de": "Ich wünschte, ich hätte mehr Zeit."}, {"en": "The consequence of that choice was clear.", "de": "Die Konsequenz dieser Wahl war klar."}], "practice": [{"type": "mcq", "q": "Which conditional describes an unreal past?", "options": ["third conditional", "second conditional", "first conditional", "mixed conditional"], "answer": "third conditional"}, {"type": "mcq", "q": "Complete: If I ___ more time, I would read more.", "options": ["had", "have", "would have", "have had"], "answer": "had"}, {"type": "fill", "q": "I would have helped if I ___ known.", "answer": "had"}, {"type": "fill", "q": "I ___ I had more time. (wish)", "answer": "wish"}, {"type": "match", "pairs": [["hypothetical", "hypothetisch"], ["regret", "das Bedauern"], ["outcome", "das Ergebnis"]]}], "quiz": [{"q": "What does the third conditional describe?", "options": ["An unreal past situation", "An unreal present situation", "A real future plan", "A general truth"], "answer": "An unreal past situation"}, {"q": "Complete: I would have come if I ___ known.", "options": ["had", "have", "would have", "knew"], "answer": "had"}, {"q": "What does das Bedauern mean?", "options": ["regret", "consequence", /* ── config ── */
var LANGUAGES = ["German","English"];
var LEVELS = {
  "German":[
    {code:"A0",label:"Absolute Beginner"},{code:"A1",label:"Beginner"},
    {code:"A2",label:"Elementary"},{code:"B1",label:"Intermediate"},
    {code:"B2",label:"Upper Intermediate"},{code:"C1",label:"Advanced"},{code:"C2",label:"Mastery"}
  ],
  "English":[
    {code:"Beginner",label:"Just starting out"},{code:"Elementary",label:"Basic conversations"},
    {code:"Intermediate",label:"Comfortable speaking"},{code:"Upper-Intermediate",label:"Confident and clear"},
    {code:"Advanced",label:"Precise and nuanced"},{code:"Fluent",label:"Natural and idiomatic"}
  ]
};

/* ── storage (graceful fallback when unavailable e.g. content:// URIs) ── */
var _store = {};
function stGet(k){ try{ return localStorage.getItem(k); }catch(e){ return _store[k]||null; } }
function stSet(k,v){ try{ localStorage.setItem(k,v); }catch(e){ _store[k]=v; } }

/* ── state ── */
var SK = "mla_v4";
function defState(){ return {language:null,level:null,completed:{},lastView:"landing",lastParam:null,lastVisited:null}; }
var state = (function(){
  try{ var r=JSON.parse(stGet(SK)); return r?Object.assign(defState(),r):defState(); }
  catch(e){ return defState(); }
})();
function save(){ try{ stSet(SK,JSON.stringify(state)); }catch(e){} }

/* ── helpers ── */
function getLesson(id){ return LESSONS.find(function(l){return l.id===id;})||null; }
function lessonsFor(lg,lv){ return LESSONS.filter(function(l){return l.language===lg&&l.level===lv;}); }
function levelDone(lg,lv){
  return lessonsFor(lg,lv).filter(function(l){var c=state.completed[l.id];return c&&c.passed;}).length;
}
function esc(s){
  return String(s).replace(/[&<>"']/g,function(c){
    return{"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c];
  });
}
function norm(s){ return String(s).trim().toLowerCase(); }

/* ── router (pure in-memory, no hash, works on content:// and file://) ── */
var app = document.getElementById("app");

function go(view, param){
  state.lastView = view;
  state.lastParam = param || null;
  save();
  render(view, param);
  window.scrollTo(0,0);
}

function render(view, param){
  view = view || "landing";
  if(view==="landing"){ vLanding(); }
  else if(view==="languages"){ vLanguages(); }
  else if(view==="levels"){ vLevels(); }
  else if(view==="dashboard"){ vDashboard(); }
  else if(view==="lesson"){ vLesson(param); }
  else if(view==="practice"){ vPractice(param); }
  else if(view==="quiz"){ vQuiz(param); }
  else if(view==="result"){ vResult(param); }
  else if(view==="culture"){ vCulture(); }
  else{ vLanding(); }
}

/* ── layout helpers ── */
function navbar(){
  var badge = (state.language&&state.level)
    ?'<span class="nav-badge">'+esc(state.language)+' &middot; '+esc(state.level)+'</span>':"";
  var dash = (state.language&&state.level)
    ?'<button class="nav-links-btn" data-nav="dashboard">Dashboard</button>':"";
  return '<nav class="navbar">'+
    '<button class="nav-brand" data-nav="landing">MonaLisa <span>Language Academy</span></button>'+
    '<div class="nav-links">'+dash+
    '<button class="nav-links-btn" data-nav="languages">Languages</button>'+
    '<button class="nav-links-btn" data-nav="culture">Culture</button>'+
    badge+'</div></nav>';
}
function foot(){
  return '<footer>MonaLisa Language Academy &middot; MonaLisa Tech Solutions<br>'+
    'kabuusumonalisa@gmail.com &middot; +256703703711</footer>';
}
function bar(pct){
  pct=Math.max(0,Math.min(100,pct));
  return '<div class="progress-row">'+
    '<div class="progress-track"><div class="progress-fill" style="width:'+pct+'%"></div></div>'+
    '<span class="pct">'+pct+'%</span></div>';
}
function fc(icon,t,tx,bg){
  return '<div class="feat-card" style="background:'+(bg||"#fff")+';">'+
    '<div class="feat-icon">'+icon+'</div><h3>'+t+'</h3>'+
    '<p class="muted">'+tx+'</p></div>';
}

/* ── views ── */
function vLanding(){
  var resume=(state.language&&state.level)
    ?'<button class="btn btn-teal" data-nav="dashboard">Resume learning</button>':"";
  app.innerHTML=navbar()+
  '<div class="container">'+
  '<div class="hero">'+
  '<div class="eyebrow">Bilingual learning &middot; German &amp; English</div>'+
  '<h1>Start speaking a new language with real confidence</h1>'+
  '<p style="color:var(--text-muted);max-width:520px;font-size:1.03rem;">Structured lessons, real vocabulary, and short quizzes move you steadily from first words to natural conversation. Pick a language and go at your own pace.</p>'+
  '<div class="hero-img"><img src="https://upload.wikimedia.org/wikipedia/commons/thumb/d/dd/Berlin_Skyline_Fernsehturm_02.jpg/1280px-Berlin_Skyline_Fernsehturm_02.jpg" alt="Berlin skyline" loading="lazy"></div>'+
  '<div class="hero-actions">'+
  '<button class="btn" data-action="start-language" data-language="German">Start German</button>'+
  '<button class="btn btn-teal" data-action="start-language" data-language="English">Start English</button>'+
  resume+'</div></div>'+
  '<div class="feat-grid">'+
  fc("📚","Structured lessons","Every lesson follows the same format: concept, vocabulary, translation trainer, and quiz.")+
  fc("✍️","Real language","No made-up examples. Every sentence reflects how people actually speak.","#f0fdf4")+
  fc("📊","Auto-saved progress","Your scores are saved automatically. Pick up exactly where you stopped.","#fef9e7")+
  fc("🤖","AI language tutor","The chat button connects you to a tutor for any German or English question.","#f0f9ff")+
  '</div></div>'+foot();
}

function vLanguages(){
  var cards=LANGUAGES.map(function(l){
    return '<button class="level-btn" data-action="choose-language" data-language="'+l+'" style="text-align:center">'+
      '<div class="code" style="font-size:1.5rem">'+l+'</div>'+
      '<div class="lbl">'+(l==="German"?"A0 &rarr; C2":"Beginner &rarr; Fluent")+'</div></button>';
  }).join("");
  app.innerHTML=navbar()+
  '<div class="container narrow">'+
  '<h2>Choose a language</h2>'+
  '<p class="muted" style="margin-bottom:20px">Your progress in each language is saved separately. Switch anytime.</p>'+
  '<div class="level-grid">'+cards+'</div></div>'+foot();
}

function vLevels(){
  if(!state.language){go("languages");return;}
  var cards=LEVELS[state.language].map(function(lv){
    var total=lessonsFor(state.language,lv.code).length;
    var done=levelDone(state.language,lv.code);
    var tick=(total>0&&done===total)?'<div class="done">&#x2713; Completed</div>':
             (done>0?'<div class="done">'+done+'/'+total+' done</div>':"");
    return '<button class="level-btn" data-action="choose-level" data-level="'+lv.code+'">'+
      '<div class="code">'+lv.code+'</div><div class="lbl">'+lv.label+'</div>'+tick+'</button>';
  }).join("");
  app.innerHTML=navbar()+
  '<div class="container narrow">'+
  '<div class="eyebrow">'+esc(state.language)+'</div>'+
  '<h2>Choose your level</h2>'+
  '<p class="muted" style="margin-bottom:20px">Not sure where to start? Pick the lowest level that feels comfortable and move up from there.</p>'+
  '<div class="level-grid">'+cards+'</div></div>'+foot();
}

function vDashboard(){
  if(!state.language){go("languages");return;}
  if(!state.level){go("levels");return;}
  var lessons=lessonsFor(state.language,state.level);
  var total=lessons.length, done=levelDone(state.language,state.level);
  var pct=total>0?Math.round((done/total)*100):0;
  var resumeHtml="";
  if(state.lastVisited&&state.lastVisited.language===state.language&&state.lastVisited.level===state.level){
    var rl=getLesson(state.lastVisited.lessonId);
    if(rl){
      var st=state.lastVisited.stage||"lesson";
      resumeHtml='<div class="card" style="background:#eef6ff;border-color:#bfdbfe">'+
        '<div class="eyebrow">Continue from where you stopped</div>'+
        '<div class="lesson-card" style="border:none;padding:0;background:transparent">'+
        '<div><div class="lc-title">'+esc(rl.title)+'</div>'+
        '<div class="lc-meta">'+rl.language+' &middot; '+rl.level+'</div></div>'+
        '<button class="btn" data-nav="'+st+'" data-param="'+rl.id+'">Resume</button></div></div>';
    }
  }
  var lcards=lessons.map(function(l){
    var c=state.completed[l.id];
    var meta=c&&c.passed
      ?'<span class="badge-ok">Passed &middot; '+c.quizScore+'/'+c.quizTotal+'</span>'
      :(c?'<span style="color:var(--error);font-size:.8rem;font-weight:600">Not passed yet</span>'
         :'<span style="color:var(--text-muted);font-size:.8rem">Not started</span>');
    return '<div class="lesson-card">'+
      '<div><div class="lc-title">'+esc(l.title)+'</div>'+
      '<div class="lc-meta" style="margin-top:5px">'+meta+'</div></div>'+
      '<button class="btn btn-secondary" data-nav="lesson" data-param="'+l.id+'">Open</button></div>';
  }).join("");
  app.innerHTML=navbar()+
  '<div class="container">'+
  '<div class="eyebrow">'+esc(state.language)+' &middot; '+esc(state.level)+'</div>'+
  '<h2>Your dashboard</h2>'+bar(pct)+resumeHtml+
  '<div class="card"><h3>Lessons in this level</h3>'+lcards+'</div>'+
  '<div class="card" style="background:#f0fdf4;border-color:#bbf7d0;display:flex;gap:14px;flex-wrap:wrap;align-items:center">'+

function vPractice(id){
  var l=getLesson(id);
  if(!l){go("dashboard");return;}
  state.lastVisited={language:l.language,level:l.level,lessonId:l.id,stage:"practice"};
  save();
  var blocks=l.practice.map(function(p,i){
    if(p.type==="mcq"){
      var opts=p.options.map(function(o){
        return '<label class="opt"><input type="radio" name="pr'+i+'" value="'+esc(o)+'"> '+esc(o)+'</label>';
      }).join("");
      return '<div class="q-block" data-pi="'+i+'" data-type="mcq" data-answer="'+esc(p.answer)+'">'+
        '<div class="qt">'+(i+1)+'. '+esc(p.q)+'</div>'+opts+'<div class="qfb"></div></div>';
    }
    if(p.type==="fill"){
      return '<div class="q-block" data-pi="'+i+'" data-type="fill" data-answer="'+esc(p.answer)+'">'+
        '<div class="qt">'+(i+1)+'. '+esc(p.q)+'</div>'+
        '<input type="text" placeholder="Type your answer"><div class="qfb"></div></div>';
    }
    if(p.type==="match"){
      var lefts=p.pairs.map(function(x){return x[0];});
      var rights=p.pairs.map(function(x){return x[1];}).slice().sort(function(){return Math.random()-.5;});
      var ap=JSON.stringify(p.pairs).replace(/"/g,"&quot;");
      var rows=lefts.map(function(left,idx){
        var o2=rights.map(function(r){return '<option value="'+esc(r)+'">'+esc(r)+'</option>';}).join("");
        return '<div class="match-row"><span>'+esc(left)+'</span>'+
          '<select data-ms="'+idx+'"><option value="">Choose...</option>'+o2+'</select></div>';
      }).join("");
      return '<div class="q-block" data-pi="'+i+'" data-type="match" data-pairs="'+ap+'">'+
        '<div class="qt">'+(i+1)+'. Match each word to its correct meaning.</div>'+rows+'<div class="qfb"></div></div>';
    }
  }).join("");
  app.innerHTML=navbar()+
  '<div class="container narrow">'+
  '<div class="eyebrow">'+esc(l.language)+' &middot; '+esc(l.level)+' &middot; Practice</div>'+
  '<h2>'+esc(l.title)+'</h2>'+
  '<p class="muted" style="margin-bottom:18px">Five questions. Check your answers as many times as you need.</p>'+
  blocks+
  '<div class="gap-row">'+
  '<button class="btn btn-secondary" data-action="check-practice">Check answers</button>'+
  '<button class="btn" data-nav="quiz" data-param="'+l.id+'">Continue to quiz &rarr;</button>'+
  '</div></div>'+foot();
}

function vQuiz(id){

/* ── event delegation ── */
document.addEventListener("click", function(e){
  /* nav buttons */
  var navEl = e.target.closest("[data-nav]");
  if(navEl){
    var view = navEl.getAttribute("data-nav");
    var param = navEl.getAttribute("data-param") || null;
    go(view, param);
    return;
  }

  /* action buttons */
  var el = e.target.closest("[data-action]");
  if(!el) return;
  var action = el.getAttribute("data-action");

  if(action==="start-language"||action==="choose-language"){
    state.language = el.getAttribute("data-language");
    save(); go("levels");
  }
  else if(action==="choose-level"){
    state.level = el.getAttribute("data-level");
    save(); go("dashboard");
  }
  else if(action==="check-translation"){
    var idx = el.getAttribute("data-index");
    var inp = app.querySelector('[data-ti="'+idx+'"]');
    var fb  = app.querySelector('[data-tf="'+idx+'"]');
    var ans = inp.getAttribute("data-answer");
    if(norm(inp.value)===norm(ans)){
      fb.className="t-fb ok"; fb.textContent="Correct! "+ans;
    } else {
      fb.className="t-fb bad"; fb.textContent="Not quite. The correct translation is: "+ans;
    }
  }
  else if(action==="check-practice"){ checkPractice(); }
  else if(action==="submit-quiz"){ submitQuiz(el.getAttribute("data-lesson")); }
  else if(action==="reset-level"){
    if(!confirm("Reset all progress for this level?")) return;
    lessonsFor(state.language,state.level).forEach(function(l){ delete state.completed[l.id]; });
    state.lastVisited = null; save(); go("dashboard");
  }

  /* quiz option highlight */
  var opt = e.target.closest(".opt");
  if(opt){
    var block = opt.closest(".q-block");
    if(block && block.hasAttribute("data-qi")){
      block.querySelectorAll(".opt").forEach(function(o){o.classList.remove("sel");});
      opt.classList.add("sel");
      var r = opt.querySelector('input[type="radio"]');
      if(r) r.checked = true;
    }
  }
});

function checkPractice(){
  app.querySelectorAll(".q-block[data-pi]").forEach(function(block){
    var type = block.getAttribute("data-type");
    var fb   = block.querySelector(".qfb");
    if(type==="mcq"){
      var sel = block.querySelector('input[type="radio"]:checked');
      var ans = block.getAttribute("data-answer");
      if(!sel){ fb.className="qfb bad"; fb.textContent="Please choose an answer."; return; }
      if(norm(sel.value)===norm(ans)){ fb.className="qfb ok"; fb.textContent="Correct."; }
      else{ fb.className="qfb bad"; fb.textContent="Not quite. The correct answer is: "+ans; }
    } else if(type==="fill"){
      var inp2 = block.querySelector('input[type="text"]');
      var ans2 = block.getAttribute("data-answer");
      if(norm(inp2.value)===norm(ans2)){ fb.className="qfb ok"; fb.textContent="Correct."; }
      else{ fb.className="qfb bad"; fb.textContent="Not quite. The correct answer is: "+ans2; }
    } else if(type==="match"){
      var raw   = block.getAttribute("data-pairs").replace(/&quot;/g,'"');
      var pairs = JSON.parse(raw);
      var sels  = block.querySelectorAll("select");
      var ok    = true;
      sels.forEach(function(s,i){ if(norm(s.value)!==norm(pairs[i][1])) ok=false; });
      if(ok){ fb.className="qfb ok"; fb.textContent="All matches correct."; }
      else  { fb.className="qfb bad"; fb.textContent="Some matches are wrong. Try again."; }
    }
  });
}

function submitQuiz(lessonId){
  var l = getLesson(lessonId); if(!l) return;
  var blocks = app.querySelectorAll(".q-block[data-qi]");
  var score = 0, unanswered = false;
  blocks.forEach(function(block){
    var sel = block.querySelector('input[type="radio"]:checked');
    if(!sel){ unanswered=true; return; }
    if(norm(sel.value)===norm(block.getAttribute("data-answer"))) score++;
  });
  if(unanswered){ alert("Please answer every question before submitting."); return; }
  var total = l.quiz.length, passed = (score/total)>=0.7;
  state.completed[l.id] = {quizScore:score, quizTotal:total, passed:passed};
  save(); go("result", l.id);
}

/* ── chatbot ── */
var chatToggle  = document.getElementById("chatToggle");
var chatWin     = document.getElementById("chatWin");
var chatClose   = document.getElementById("chatClose");
var chatMsgs    = document.getElementById("chatMsgs");
var chatIn      = document.getElementById("chatIn");
var chatSend    = document.getElementById("chatSend");
var chatKeySave = document.getElementById("chatKeySave");
var chatApiKey  = document.getElementById("chatApiKey");
var chatKeyPanel= document.getElementById("chatKeyPanel");

(function(){
  var k = stGet("mla_apikey");
  if(k){ chatKeyPanel.style.display="none"; addBubble("API key loaded. Ask me anything about German or English!","bot"); }
})();

chatKeySave.addEventListener("click",function(){
  var k=chatApiKey.value.trim(); if(!k) return;
  stSet("mla_apikey",k); chatKeyPanel.style.display="none";
  addBubble("API key saved. Ask me anything about German or English!","bot");
});
chatToggle.addEventListener("click",function(){
  chatWin.classList.toggle("open"); if(chatWin.classList.contains("open")) chatIn.focus();
});
chatClose.addEventListener("click",function(){ chatWin.classList.remove("open"); });

function addBubble(text,role,thinking){
  var d=document.createElement("div");
  d.className="bubble "+role+(thinking?" thinking":"");
  d.textContent=text;
  chatMsgs.appendChild(d);
  chatMsgs.scrollTop=chatMsgs.scrollHeight;
  return d;
}

async function sendChat(){
  var msg=chatIn.value.trim(); if(!msg) return;
  chatIn.value=""; addBubble(msg,"user");
  var thinking=addBubble("Thinking...","bot",true);
  var apiKey=stGet("mla_apikey")||"";
  if(!apiKey){
    thinking.className="bubble bot";
    thinking.textContent="Please save your Anthropic API key using the field above to activate the tutor.";
    return;
  }
  try{
    var res=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "x-api-key":apiKey,
        "anthropic-version":"2023-06-01",
        "anthropic-dangerous-direct-browser-access":"true"
      },
      body:JSON.stringify({
        model:"claude-sonnet-4-6",
        max_tokens:600,
        system:"You are a friendly, knowledgeable language tutor for the MonaLisa Language Academy. You specialize in German and English. Answer questions about grammar, vocabulary, pronunciation, usage, culture, idioms, and learning strategies. Keep answers clear, warm, and practical. If asked something unrelated to German or English, politely redirect the user back to language topics.",
        messages:[{role:"user",content:msg}]
      })
    });
    var data=await res.json();
    var reply=(data.content&&data.content[0]&&data.content[0].text)||"I could not generate a response right now. Please try again.";
    thinking.className="bubble bot"; thinking.textContent=reply;
  } catch(err){
    thinking.className="bubble bot";
    thinking.textContent="Could not reach the tutor. Check your internet connection and API key, then try again.";
  }
  chatMsgs.scrollTop=chatMsgs.scrollHeight;
}
chatSend.addEventListener("click",sendChat);
chatIn.addEventListener("keydown",function(e){ if(e.key==="Enter") sendChat(); });

/* ── boot: works on any URI scheme ── */
(function boot(){
  render(state.lastView || "landing", state.lastParam || null);
})();

</script>
